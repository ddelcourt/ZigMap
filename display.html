<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapping26 — Display</title>
  <meta name="theme-color" content="#000000">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    
    #canvas-container {
      width: 100%;
      height: 100%;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    #canvas-wrapper {
      width: 100%;
      height: 100%;
    }
    
    #connection-status {
      position: absolute;
      top: 20px;
      left: 20px;
      padding: 10px 16px;
      background: rgba(0, 0, 0, 0.8);
      color: #fff;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: opacity 0.3s ease;
    }
    
    #connection-status.connected {
      opacity: 0;
      pointer-events: none;
    }
    
    #connection-status .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff4444;
      animation: pulse 1.5s ease-in-out infinite;
    }
    
    #connection-status.connected .dot {
      background: #44ff44;
      animation: none;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    
    /* Overlay rendering */
    #overlay-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }
    
    #overlay-container img {
      position: absolute;
      display: none;
    }
    
    #overlay-container img.visible {
      display: block;
    }
  </style>
  
  <!-- External Libraries -->
  <script src="lib/p5.min.js" onerror="this.onerror=null; this.src='https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js'"></script>
</head>
<body>

  <div id="canvas-container">
    <div id="canvas-wrapper"></div>
    
    <!-- Overlay container -->
    <div id="overlay-container">
      <img id="overlay-image" alt="Overlay">
    </div>
  </div>
  
  <!-- Connection status indicator -->
  <div id="connection-status">
    <span class="dot"></span>
    <span id="status-text">Waiting for primary window...</span>
  </div>

  <!-- Display window script -->
  <script type="module" src="js/display.js"></script>

</body>
</html>
