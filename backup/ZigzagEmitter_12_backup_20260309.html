<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zigzag Emitter v12 - Centralized Keyboard Shortcuts</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ccapture.js@1.1.0/build/CCapture.all.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1b1b1b;
      color: #e8e8e8;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      min-height: 100vh;
      gap: 0;
      padding: 0;
      overflow: hidden;
    }

    #canvas-wrapper {
      background: #000;
      overflow: visible;
      box-shadow: none;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      transition: all 0.3s;
    }

    #canvas-wrapper.framebuffer-mode {
      width: auto;
      height: auto;
      outline: 1px solid #555555;
      outline-offset: -1px;
    }

    #canvas-wrapper.stereoscopic {
      flex-direction: column;
      gap: 0;
    }

    .stereo-container {
      display: flex;
      flex-direction: row;
      gap: 0;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
      max-width: 100%;
      overflow: hidden;
    }

    .stereo-eye {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      overflow: hidden;
      min-width: 0;
      outline: 1.5px solid rgb(0, 255, 0);
      outline-offset: -1px;
      position: relative;
    }

    .stereo-eye::after {
      content: '';
      position: absolute;
      bottom: 10px;
      left: 50%;
      width: 25px;
      height: 25px;
      background: rgb(0, 255, 0);
      pointer-events: none;
      border-radius: 50%;
      transform: translate(-50%, 10%);
    }

    #canvas-wrapper canvas {
      display: block;
      cursor: grab;
      width: auto !important;
      height: auto !important;
    }

    #canvas-wrapper:not(.stereoscopic).framebuffer-mode canvas {
      max-width: none;
      max-height: none;
      outline: 1px solid #555;
      outline-offset: -1px;
    }

    .framebuffer-mode .stereo-eye canvas {
      outline: 1px solid rgb(0, 255, 0);
      outline-offset: -1px;
    }

    #canvas-wrapper canvas.dragging { cursor: none !important; }
    body.ui-hidden { cursor: none !important; }
    body.ui-hidden * { cursor: none !important; }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 300px;
      min-width: 300px;
      background: rgba(10, 10, 10, 0.25);
      backdrop-filter: blur(10px);
      padding: 20px;
      height: 100vh;
      overflow-y: auto;
      border-right: 1px solid rgba(34, 34, 34, 0.3);
      transition: transform 0.3s ease, opacity 0.3s ease;
      position: fixed;
      left: 0;
      top: 0;
      z-index: 10;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .controls::-webkit-scrollbar { display: none; }

    .controls.hidden {
      transform: translateX(-100%);
      opacity: 0;
      pointer-events: none;
    }

    .control-group { display: flex; flex-direction: column; gap: 10px; }

    label {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #666;
    }

    input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border: 2px solid #444;
      border-radius: 3px;
      background: #1a1a1a;
      cursor: pointer;
      position: relative;
      margin-right: 8px;
      transition: all 0.2s;
    }

    input[type="checkbox"]:hover {
      border-color: #0087ff;
    }

    input[type="checkbox"]:checked {
      background: #0087ff;
      border-color: #0087ff;
    }

    input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 4px;
      top: 1px;
      width: 4px;
      height: 8px;
      border: solid #fff;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    .slider-row { display: flex; align-items: center; gap: 14px; }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 12px;
      background: transparent;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-runnable-track {
      width: 100%;
      height: 2px;
      background: #2a2a2a;
      border-radius: 2px;
    }

    input[type="range"]::-moz-range-track {
      width: 100%;
      height: 2px;
      background: #2a2a2a;
      border-radius: 2px;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #0087ff;
      border: 2px solid #0a0a0a;
      box-shadow: 0 0 0 1px #444;
      cursor: pointer;
      transition: transform 0.1s;
      margin-top: -5px;
      transform: translateY(0.5px);
    }

    input[type="range"]::-moz-range-thumb {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #0087ff;
      border: 2px solid #0a0a0a;
      box-shadow: 0 0 0 1px #444;
      cursor: pointer;
      transition: transform 0.1s;
      border: none;
      transform: translateY(0.5px);
    }

    input[type="range"]::-webkit-slider-thumb:hover { transform: translateY(0.5px) scale(1.3); }
    input[type="range"]::-moz-range-thumb:hover { transform: translateY(0.5px) scale(1.3); }

    /* Dual-range slider container with dedicated track line */
    .range-slider-container {
      position: relative;
      width: 100%;
      height: 12px;
    }

    .slider-track-line {
      position: absolute;
      top: 5px;
      left: 0;
      right: 0;
      height: 2px;
      background: #2a2a2a;
      border-radius: 2px;
      z-index: 1;
      pointer-events: none;
    }

    .range-slider-container input[type="range"] {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      pointer-events: none;
      z-index: 2;
    }

    .range-slider-container input[type="range"]::-webkit-slider-runnable-track {
      background: transparent;
    }

    .range-slider-container input[type="range"]::-moz-range-track {
      background: transparent;
    }

    .range-slider-container input[type="range"]::-webkit-slider-thumb { 
      pointer-events: auto;
    }
    
    .range-slider-container input[type="range"]::-moz-range-thumb { 
      pointer-events: auto;
    }

    .value-display {
      font-size: 0.85rem;
      color: #ccc;
      min-width: 42px;
      text-align: right;
    }

    .range-values {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      color: #666;
      margin-top: 2px;
    }

    .range-values span {
      color: #888;
    }

    .color-row { display: flex; gap: 10px; flex-wrap: wrap; }

    .swatch {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.15s, border-color 0.15s;
    }
    .swatch:hover  { transform: scale(1.15); }
    .swatch.active { border-color: #fff; }

    .cap-btn {
      background: #1a1a1a;
      border: 1px solid #333;
      color: #aaa;
      font-size: 1rem;
      width: 34px;
      height: 34px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .cap-btn:hover  { background: #252525; }
    .cap-btn.active { border-color: #888; background: #2a2a2a; color: #fff; }

    .about-btn {
      width: 100%;
      padding: 10px 12px;
      background: #1a1a1a;
      border: 1px solid #333;
      color: #aaa;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .about-btn:hover {
      background: #252525;
      border-color: #444;
      transform: translateX(2px);
    }
    /* .about-btn::before { content: '📄'; font-size: 1rem; } */

    .lang-filter {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid #333;
    }

    .lang-filter-btn {
      flex: 1;
      padding: 6px 12px;
      background: rgba(40, 40, 40, 0.8);
      border: 1px solid #444;
      border-radius: 4px;
      color: #888;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .lang-filter-btn:hover {
      background: rgba(50, 50, 50, 0.9);
      border-color: #666;
      color: #aaa;
    }

    .lang-filter-btn.active {
      background: rgba(80, 120, 255, 0.2);
      border-color: #5078ff;
      color: #5078ff;
      font-weight: bold;
    }

    .about-btn[data-lang] {
      display: block;
    }

    .about-btn[data-lang].hidden {
      display: none;
    }

    .section {
      flex-shrink: 0;
      border: 1px solid #222;
      border-radius: 4px;
      background: rgba(20, 20, 20, 0.5);
      overflow: hidden;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      cursor: pointer;
      user-select: none;
      background: rgba(15, 15, 15, 0.7);
      border-bottom: 1px solid transparent;
      transition: background 0.2s;
    }

    .section-header:hover { background: rgba(25, 25, 25, 0.7); }
    .section-header.active { border-bottom-color: #222; }

    .section-title {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #999;
      font-weight: 500;
    }

    .section-toggle { color: #666; font-size: 0.9rem; transition: transform 0.2s; }
    .section-header.active .section-toggle { transform: rotate(180deg); }
    .section-content { display: none; }
    .section-content.expanded { display: block; }

    .section-body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* ── Export buttons ── */
    .export-btn {
      width: 100%;
      padding: 12px;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 10px;
    }
    .export-btn-png {
      background: #1a3a5f;
      border: 1px solid #2d5a8b;
      color: #e8f0ff;
    }
    .export-btn-svg {
      background: #1a5f1a;
      border: 1px solid #2d8b2d;
      color: #e8ffe8;
    }

    /* ── Depth map button ── */
    #export-depth-map {
      width: 100%;
      padding: 12px;
      background: #1a3a2a;
      border: 1px solid #2d6b4a;
      color: #aaffcc;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    #export-depth-map:hover {
      background: #1f4d33;
      transform: scale(1.02);
    }
    #export-depth-map:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    .depth-settings {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 10px;
      background: rgba(0,20,10,0.3);
      border: 1px solid #1a3a2a;
      border-radius: 4px;
    }
    .depth-settings label {
      color: #5a8a6a;
    }
  </style>
</head>
<body>

  <div class="controls">

    <!-- UI -->
    <div class="section">
      <div class="section-header" data-section="view">
        <span class="section-title">UI</span>
        <span class="section-toggle">▼</span>
      </div>
      <div class="section-content">
        <div class="section-body">
          <div style="display:flex;flex-direction:column;gap:8px;">
            <button id="hide-controls-btn" style="width:100%;padding:8px;background:#222;border:1px solid #444;color:#fff;font-size:0.7rem;letter-spacing:0.12em;text-transform:uppercase;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;">
              <span>Hide controls</span>
              <!-- <span style="font-size:1em;">⇥</span> -->
              <!-- <span style="font-size:0.7em;color:#aaa;">Tab</span> -->
            </button>
            <button id="fullscreen-btn" style="width:100%;padding:8px;background:#222;border:1px solid #444;color:#fff;font-size:0.7rem;letter-spacing:0.12em;text-transform:uppercase;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;">
              <span>Fullscreen</span>
              <!-- <span style="font-size:1em;">⏎</span> -->
              <!-- <span style="font-size:0.7em;color:#aaa;">Return</span> -->
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- File -->
    <div class="section">
      <div class="section-header" data-section="file">
        <span class="section-title">File</span>
        <span class="section-toggle">▼</span>
      </div>
      <div class="section-content">
        <div class="section-body">
          <div style="display: flex; gap: 8px;">
            <button id="save-json" style="flex:1;padding:10px;background:#1a3a1a;border:1px solid #2d5f2d;color:#aaffaa;font-size:0.75rem;letter-spacing:0.12em;text-transform:uppercase;border-radius:4px;cursor:pointer;">Save</button>
            <button id="load-json" style="flex:1;padding:10px;background:#1a1a3a;border:1px solid #2d2d5f;color:#aaaaff;font-size:0.75rem;letter-spacing:0.12em;text-transform:uppercase;border-radius:4px;cursor:pointer;">Load</button>
            <input type="file" id="load-json-input" accept=".json" style="display:none;">
          </div>
        </div>
      </div>
    </div>

    <!-- Camera -->
    <div class="section">
      <div class="section-header" data-section="rendering">
        <span class="section-title">Camera</span>
        <span class="section-toggle">▼</span>
      </div>
      <div class="section-content">
        <div class="section-body">
          <div class="control-group">
            <label><input type="checkbox" id="stereoscopic-mode">Stereoscopic View (VR)</label>
          </div>
          <div class="control-group">
            <label>Eye Separation</label>
            <div class="slider-row">
              <input type="range" id="eye-separation" min="0" max="100" value="30"/>
              <span class="value-display" id="eye-separation-val">30</span>
            </div>
          </div>
          <div class="control-group">
            <label><input type="checkbox" id="framebuffer-mode">Framebuffer Resolution</label>
          </div>
          <div class="control-group">
            <label>Preset</label>
            <select id="framebuffer-preset" style="width:100%;background:#1a1a1a;border:1px solid #333;color:#ccc;padding:6px;border-radius:3px;font-size:0.85rem;cursor:pointer;">
              <option value="1920x1080">1920 × 1080 (HD Horizontal)</option>
              <option value="1080x1920">1080 × 1920 (HD Vertical)</option>
              <option value="1080x1080">1080 × 1080 (HD Small Square)</option>
              <option value="1920x1920">1920 × 1920 (HD Big Square)</option>
              <option value="3840x2160">3840 × 2160 (4K Horizontal)</option>
              <option value="2160x3840">2160 × 3840 (4K Vertical)</option>
              <option value="2160x2160">2160 × 2160 (4K Small Square)</option>
              <option value="3840x3840">3840 × 3840 (4K Big Square)</option>
              <option value="3500x1500">3500 × 1500 (Website Banner)</option>
              <option value="1080x1440">1080 × 1440 (Instagram Post)</option>
              <option value="custom">Custom Dimensions</option>
            </select>
          </div>
          <div class="control-group">
            <label>Resolution</label>
            <div style="display:flex;gap:8px;">
              <input type="number" id="framebuffer-width"  value="1920" min="320" step="1" style="flex:1;min-width:0;background:#1a1a1a;border:1px solid #333;color:#ccc;padding:6px;border-radius:3px;font-size:0.85rem;" placeholder="Width"/>
              <span style="color:#666;align-self:center;">×</span>
              <input type="number" id="framebuffer-height" value="1080" min="240" step="1" style="flex:1;min-width:0;background:#1a1a1a;border:1px solid #333;color:#ccc;padding:6px;border-radius:3px;font-size:0.85rem;" placeholder="Height"/>
            </div>
          </div>
          <div class="control-group">
            <label>Clipping Planes</label>
            <div class="range-slider-container">
              <div class="slider-track-line"></div>
              <input type="range" id="near" min="0.01" max="500"   value="0.01"/>
              <input type="range" id="far"  min="500"  max="20000" value="20000"/>
            </div>
            <div class="range-values">
              <span>Near: <span id="near-val">0.01</span></span>
              <span>Far: <span id="far-val">20000</span></span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Geometry -->
    <div class="section">
      <div class="section-header" data-section="geometry">
        <span class="section-title">Geometry</span>
        <span class="section-toggle">▼</span>
      </div>
      <div class="section-content">
        <div class="section-body">
          <div class="control-group">
            <label>Emitter Range</label>
            <div class="slider-row">
              <input type="range" id="seg-length" min="10" max="240" value="120"/>
              <span class="value-display" id="seg-length-val">120</span>
            </div>
          </div>
          <div class="control-group">
            <label>Line Thickness</label>
            <div class="slider-row">
              <input type="range" id="thickness" min="1" max="20" value="12"/>
              <span class="value-display" id="thickness-val">12</span>
            </div>
          </div>
          <div class="control-group">
            <label>Z-Plane Rotation</label>
            <div class="slider-row">
              <input type="range" id="emitter-rotation" min="0" max="360" value="0"/>
              <span class="value-display" id="emitter-rotation-val">0</span>
            </div>
          </div>
          <div class="control-group">
            <label>Scale <span style="color:#444">(%)</span></label>
            <div class="slider-row">
              <input type="range" id="geometry-scale" min="100" max="400" value="100"/>
              <span class="value-display" id="geometry-scale-val">100</span>
            </div>
          </div>
          <div class="control-group">
            <label>Field of View</label>
            <div class="slider-row">
              <input type="range" id="fov" min="0.01" max="180" value="60"/>
              <span class="value-display" id="fov-val">60</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Behavior -->
    <div class="section">
      <div class="section-header" data-section="behavior">
        <span class="section-title">Behavior</span>
        <span class="section-toggle">▼</span>
      </div>
      <div class="section-content">
        <div class="section-body">
          <div class="control-group">
            <label>Emit Rate <span style="color:#444">(lines/sec)</span></label>
            <div class="slider-row">
              <input type="range" id="emit-rate" min="0.1" max="10" value="1.5"/>
              <span class="value-display" id="emit-rate-val">1.5</span>
            </div>
          </div>
          <div class="control-group">
            <label>Speed <span style="color:#444">(px/sec)</span></label>
            <div class="slider-row">
              <input type="range" id="speed" min="10" max="500" value="80"/>
              <span class="value-display" id="speed-val">80</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Modulations -->
    <div class="section">
      <div class="section-header" data-section="modulations">
        <span class="section-title">Modulations</span>
        <span class="section-toggle">▼</span>
      </div>
      <div class="section-content">
        <div class="section-body">
          <div class="control-group">
            <label><input type="checkbox" id="random-thickness">Random Thickness</label>
          </div>
          <div class="control-group">
            <label>Thickness Range <span style="color:#444">(% of base)</span></label>
            <div class="range-slider-container">
              <div class="slider-track-line"></div>
              <input type="range" id="thickness-range-min" min="10" max="400" value="10"/>
              <input type="range" id="thickness-range-max" min="10" max="400" value="200"/>
            </div>
            <div class="range-values">
              <span id="thickness-range-min-val">10%</span>
              <span id="thickness-range-max-val">200%</span>
            </div>
          </div>
          <div class="control-group">
            <label><input type="checkbox" id="random-speed">Random Speed</label>
          </div>
          <div class="control-group">
            <label>Speed Range <span style="color:#444">(% of base)</span></label>
            <div class="range-slider-container">
              <div class="slider-track-line"></div>
              <input type="range" id="speed-range-min" min="50" max="200" value="50"/>
              <input type="range" id="speed-range-max" min="50" max="200" value="150"/>
            </div>
            <div class="range-values">
              <span id="speed-range-min-val">50%</span>
              <span id="speed-range-max-val">150%</span>
            </div>
          </div>
          <div class="control-group">
            <label>Ambient Speed Master</label>
            <div class="slider-row">
              <input type="range" id="ambient-speed-master" min="5" max="100" value="100"/>
              <span class="value-display"><span id="ambient-speed-master-val">100</span>%</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Colors -->
    <div class="section">
      <div class="section-header" data-section="colors">
        <span class="section-title">Colors</span>
