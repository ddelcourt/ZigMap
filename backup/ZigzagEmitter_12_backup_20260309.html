  <script>
    // ═══════════════════════════════════════════════════════════════════════════
    // ZIGZAG EMITTER v12 — Centralized Keyboard Shortcuts
    // ═══════════════════════════════════════════════════════════════════════════
    //
    // DEPTH MAP TECHNIQUE:
    //   CPU-based projection using the exact same camera math as SVG export.
    //   Scene geometry is projected to 2D screen space with depth values.
    //   Depth is auto-ranged from actual geometry (scanDepthRange), then encoded
    //   as greyscale with a power curve (gamma 0.6) for contrast enhancement.
    //   White = near objects, Black = far objects, rendered to offscreen canvas.
    //   Guarantees pixel-perfect alignment with PNG export.
    // ═══════════════════════════════════════════════════════════════════════════

    const params = {
      segmentLength:    120,
      lineThickness:    12,
      lineColor:        [255, 255, 255],
      emitRate:         1.5,
      speed:            80,
      fov:              60,
      near:             0.01,
      far:              20000,
      emitterRotation:  0,
      geometryScale:    100,
      randomThickness:  false,
      randomSpeed:      false,
      thicknessRangeMin: 10,
      thicknessRangeMax: 200,
      speedRangeMin:    50,
      speedRangeMax:    150,
      ambientSpeedMaster: 100,
      stereoscopicMode: false,
      eyeSeparation:    30,
      framebufferMode:  false,
      framebufferPreset: '1920x1080',
      framebufferWidth: 1920,
      framebufferHeight: 1080,
      videoDuration:    10,
      videoFPS:         30,
      videoFormat:      'webm',
      cameraRotationX:  -0.3,
      cameraRotationY:  0,
      cameraDistance:   600,
      cameraOffsetX:    0,
      cameraOffsetY:    0,
      // Depth map settings
      depthInvert:       false
    };

    const SEGMENTS          = 16;
    const FADE_IN_DURATION  = 0.3;
    const FADE_OUT_DISTANCE = 80;

    // ═══════════════════════════════════════════════════════════════════════════
    // KEYBOARD SHORTCUTS CONFIGURATION
    // ═══════════════════════════════════════════════════════════════════════════
    // All keyboard shortcuts defined in one place for easy editing.
    // Format: 'key': { action: 'functionName', description: 'label', ctrl: bool, shift: bool, alt: bool, meta: bool }
    // meta = Command key on Mac, Windows key on PC
    const KEYBOARD_SHORTCUTS = [
      // UI Navigation
      { key: 'Tab',   action: 'toggleControls',       description: 'Toggle controls panel',          preventDefault: true },
      { key: 'Enter', action: 'toggleFullscreen',     description: 'Toggle fullscreen',              preventDefault: true },
      { key: 'h',     action: 'toggleControls',       description: 'Hide/show controls',             preventDefault: true },
      { key: 'f',     action: 'toggleFullscreen',     description: 'Fullscreen',                     preventDefault: true },
      
      // Export Actions
      { key: 'p',     action: 'exportPNG',            description: 'Export PNG',                     preventDefault: true },
      { key: 'P',     action: 'exportPNG',            description: 'Export PNG (Shift+P)',           preventDefault: true, shift: true },
      { key: 's',     action: 'exportSVG',            description: 'Export SVG',                     preventDefault: true },
      { key: 'S',     action: 'exportSVG',            description: 'Export SVG (Shift+S)',           preventDefault: true, shift: true },
      { key: 'd',     action: 'exportDepthMap',       description: 'Export depth map',               preventDefault: true },
      { key: 'D',     action: 'exportDepthMap',       description: 'Export depth map (Shift+D)',     preventDefault: true, shift: true },
      { key: 'v',     action: 'toggleVideoRecording', description: 'Start/stop recording',          preventDefault: true },
      { key: 'j',     action: 'downloadJSON',         description: 'Save settings JSON (J)',         preventDefault: true },
      { key: 's',     action: 'downloadJSON',         description: 'Save settings JSON (Cmd/Ctrl+S)', preventDefault: true, ctrl: true },
      
      // Camera Controls
      { key: 'r',     action: 'resetCamera',          description: 'Reset camera position',          preventDefault: true },
      { key: 'R',     action: 'resetCamera',          description: 'Reset camera (Shift+R)',         preventDefault: true, shift: true },
      { key: '0',     action: 'resetZoom',            description: 'Reset zoom to default',          preventDefault: true },
      
      // Modulation Toggles
      { key: 't',     action: 'toggleRandomThickness', description: 'Toggle random thickness',      preventDefault: true },
      { key: 'm',     action: 'toggleRandomSpeed',     description: 'Toggle random speed',          preventDefault: true },
      
      // View Modes
      { key: '3',     action: 'toggleStereoMode',     description: 'Toggle stereoscopic view',       preventDefault: true },
      { key: 'b',     action: 'toggleFramebuffer',    description: 'Toggle framebuffer mode',        preventDefault: true }
    ];

    let noiseOffset = 0;
    let W = window.innerWidth;
    let H = window.innerHeight;

    const camera = {
      rotationX:  params.cameraRotationX,
      rotationY:  params.cameraRotationY,
      distance:   params.cameraDistance,
      offsetX:    params.cameraOffsetX,
      offsetY:    params.cameraOffsetY,
      isDragging: false,
      isPanning:  false,
      lastMouseX: 0,
      lastMouseY: 0
    };

    let p5Instance      = null;
    let p5InstanceRight = null;
    let emitterInstance = null;

    let capturer             = null;
    let isRecording          = false;
    let recordingFrameCount  = 0;
    let recordingTotalFrames = 0;

    let sharedLastTime = 0;
    let activeCanvasId = 'left-canvas';
    let isUpdatingCanvasSize = false;

    // ═══════════════════════════════════════════════════════════════════════════
    // HELPERS
    // ═══════════════════════════════════════════════════════════════════════════

    function getSpawnDistance() {
      const step = params.segmentLength / Math.SQRT2;
      return (SEGMENTS * step) / 2;
    }

    function buildRibbonSides(points, halfWidth) {
      const leftSide  = [];
      const rightSide = [];

      for (let i = 0; i < points.length; i++) {
        const curr = points[i];
        const prev = points[i - 1];
        const next = points[i + 1];

        if (i === 0 || i === points.length - 1) {
          leftSide.push( { x: curr.x, y: curr.y + halfWidth });
          rightSide.push({ x: curr.x, y: curr.y - halfWidth });
          continue;
        }

        const dx1 = curr.x - prev.x,  dy1 = curr.y - prev.y;
        const dx2 = next.x - curr.x,  dy2 = next.y - curr.y;
        const len1 = Math.sqrt(dx1*dx1 + dy1*dy1);
        const len2 = Math.sqrt(dx2*dx2 + dy2*dy2);

        const perp1X = -dy1/len1, perp1Y = dx1/len1;
        const perp2X = -dy2/len2, perp2Y = dx2/len2;

        let perpX = (perp1X+perp2X)/2;
        let perpY = (perp1Y+perp2Y)/2;
        const perpLen = Math.sqrt(perpX*perpX + perpY*perpY);
        if (perpLen > 0.001) { perpX /= perpLen; perpY /= perpLen; }
        else                 { perpX = 0; perpY = 1; }

        leftSide.push( { x: curr.x + perpX*halfWidth, y: curr.y + perpY*halfWidth });
        rightSide.push({ x: curr.x - perpX*halfWidth, y: curr.y - perpY*halfWidth });
      }

      return { leftSide, rightSide };
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // DEPTH MAP — CPU PROJECTION  (mirrors SVG export exactly)
    // ─────────────────────────────────────────────────────────────────────────
    // Strategy: use the IDENTICAL math as the SVG/PNG export (which is known
    // correct) to project every ribbon vertex to 2D screen space, carrying
    // along the view-space Z for depth encoding.  The result is rasterised
    // onto a plain 2D canvas using polygon fills whose colour encodes depth.
    //
    // This guarantees pixel-perfect geometry alignment with the PNG export
    // because it shares every constant and formula.
    //
    // p5 WEBGL camera model (from SVG export, ground truth):
    //   • p5 places its own default camera at  z = (H/2) / tan(fov/2)
    //   • p.translate(0,0,-camera.distance) pushes geometry away from origin
    //   • p.translate(offsetX, offsetY, 0) pans geometry
    //   • Rotations: rotateX then rotateY then rotateZ (emitter)
    //   • scale(geometryScale/100) applied to the combined world position
    //   • Per-line: translate(line.x - W/2, line.y - H/2)  inside line.draw
    //   • Perspective: s = defaultCameraZ / -viewZ,  screen = world*s + W/2
    //
    // The SVG export does NOT apply camera.offset to the rotation/projection;
    // it only pans via the same translate that p5 uses.  We replicate that.
    // ═══════════════════════════════════════════════════════════════════════════

    // Projection constants — set once at the top of _renderDepthMap()
    let _depthDefaultCameraZ = 0;
    let _depthTotalDistance  = 0;

    /**
     * Exact copy of SVG export's projectPoint(), extended to also return depth.
     * Input x,y,z are already in world space: (line.x - W/2 + pt.x) * scaleVal
     * Rotation order: rotZ → rotY → rotX  (matches SVG export exactly).
     * NO camera.offsetX/Y applied — SVG export omits them too.
     */
    function depthProjectPoint(x, y, z) {
      const eRad = params.emitterRotation * Math.PI / 180;
      const rX   = camera.rotationX;
      const rY   = camera.rotationY;

      // 1. rotateZ
      let px =  x * Math.cos(eRad) - y * Math.sin(eRad);
      let py =  x * Math.sin(eRad) + y * Math.cos(eRad);
      let pz =  z;

      // 2. rotateY
      const px2 =  px * Math.cos(rY) + pz * Math.sin(rY);
      const pz2 = -px * Math.sin(rY) + pz * Math.cos(rY);
      px = px2; pz = pz2;

      // 3. rotateX
      const py3 = py * Math.cos(rX) - pz * Math.sin(rX);
      const pz3 = py * Math.sin(rX) + pz * Math.cos(rX);
      py = py3; pz = pz3;

      // 4. Subtract total camera distance
      pz -= _depthTotalDistance;

      // 5. Clip
      if (pz >= -params.near || pz <= -params.far) return null;

      // 6. Perspective divide — identical to SVG
      const s  = _depthDefaultCameraZ / -pz;
      const sx = px * s + W / 2;
      const sy = py * s + H / 2;

      return { sx, sy, depth: -pz };
    }

    /**
     * Vertex from local line space → world space → projected.
     * Mirrors SVG toScreen():  wx = (line.x - W/2 + localX) * scaleVal
     */
    function depthProjectVertex(line, localX, localY) {
      const scale = params.geometryScale / 100;
      const wx = ((line.x - W / 2) + localX) * scale;
      const wy = ((line.y - H / 2) + localY) * scale;
      return depthProjectPoint(wx, wy, 0);
    }

    /**
     * Scan all live ribbon vertices to find the min/max depth values that
     * actually appear on screen.  Used to auto-range the greyscale encoding.
     */
    function scanDepthRange(lines) {
      let minD =  Infinity;
      let maxD = -Infinity;

      for (const line of lines) {
        if (line._alpha() <= 0) continue;
        for (const pt of line._buildVertices()) {
          const p = depthProjectVertex(line, pt.x, pt.y);
          if (!p) continue;
          if (p.depth < minD) minD = p.depth;
          if (p.depth > maxD) maxD = p.depth;
        }
      }

      if (!isFinite(minD) || !isFinite(maxD) || maxD <= minD) {
        return { minDepth: 1, maxDepth: 1000 };
      }
      // Pull minDepth slightly below the true minimum so the nearest polygon's
      // averaged depth always maps to t=0 → pure white after the power curve.
      // 3% of the total range is enough to absorb the averaging offset.
      const nudge = (maxD - minD) * 0.03;
      return { minDepth: Math.max(0.01, minD - nudge), maxDepth: maxD };
    }

    // ─────────────────────────────────────────────────────────────────────────
    // Rasterise a projected polygon onto a 2D canvas context.
    // pts  — array of { sx, sy, depth }  (already projected, depth in [0..∞])
    // minDepth / maxDepth — range to normalise into [0..1]
    // invert — bool
    // alpha  — fade alpha [0..1]
    //
    // Because all vertices of a planar ribbon have the same Z in local space,
    // they also share essentially the same depth after projection (the ribbon
    // lies flat in XY).  We average the depths for a single fill colour.
    // ─────────────────────────────────────────────────────────────────────────
    function rasteriseDepthPolygon(ctx, pts, minDepth, maxDepth, invert, alpha) {
      if (pts.length < 3) return;

      // Average depth across all projected vertices
      let depthSum = 0;
      for (const p of pts) depthSum += p.depth;
      const avgDepth = depthSum / pts.length;

      let t = (avgDepth - minDepth) / (maxDepth - minDepth);
      t = Math.max(0, Math.min(1, t));
      // Power curve: gamma < 1 boosts midtones toward white (near), increasing contrast
      t = Math.pow(t, 0.6);
      const grey = Math.round((invert ? t : 1 - t) * 255);
      const a    = Math.round(alpha * 255);

      ctx.beginPath();
      ctx.moveTo(pts[0].sx, pts[0].sy);
      for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].sx, pts[i].sy);
      ctx.closePath();
      ctx.fillStyle = `rgba(${grey},${grey},${grey},${alpha.toFixed(4)})`;
      ctx.fill();
    }

    // ─────────────────────────────────────────────────────────────────────────
    // Export entry point
    // ─────────────────────────────────────────────────────────────────────────
    function exportDepthMap() {
      if (!emitterInstance || emitterInstance.lines.length === 0) {
        alert('No lines to render — let the emitter run for a moment first.');
        return;
      }
      const btn = document.getElementById('export-depth-map');
      btn.disabled = true;
      btn.textContent = '⏳ Rendering depth…';

      setTimeout(() => {
        try   { _renderDepthMap(); }
        catch (e) {
          console.error('Depth map export failed:', e);
          alert('Depth map export failed: ' + e.message);
        } finally {
          btn.disabled = false;
          btn.textContent = '⬇ Export Depth Map';
        }
      }, 30);
    }

    function _renderDepthMap() {
      const lines = emitterInstance.lines.filter(l => l._alpha() > 0);

      // ── 0. Pre-compute projection constants — must match SVG export exactly ──
      //   p5 WEBGL places its default camera at  z = (H/2) / tan(fov/2)
      //   p.translate(0,0,-camera.distance) pushes geometry that far further back
      //   So total distance from camera to origin = defaultCameraZ + camera.distance
      const fovRad         = params.fov * Math.PI / 180;
      _depthDefaultCameraZ = (H / 2) / Math.tan(fovRad / 2);
      _depthTotalDistance  = _depthDefaultCameraZ + camera.distance;

      // ── 1. Auto-range from actual projected geometry ────────────────────────
      const { minDepth, maxDepth } = scanDepthRange(lines);
      console.log(`Depth map: near=${minDepth.toFixed(1)}, far=${maxDepth.toFixed(1)}`);

      // ── 2. Offscreen canvas — same logical resolution as the PNG export ──────
      const offCanvas = document.createElement('canvas');
      offCanvas.width  = W;
      offCanvas.height = H;
      const ctx = offCanvas.getContext('2d');

      ctx.fillStyle = '#000000';
      ctx.fillRect(0, 0, W, H);

      const invert = params.depthInvert;

      // ── 3. Project and rasterise each ribbon ────────────────────────────────
      // We use the same ribbon polygon as the PNG/SVG: leftSide then rightSide
      // reversed.  Each ribbon is a single flat polygon (all Z=0 in local
      // space) so averaging depths per polygon is exact.
      for (const line of lines) {
        const alpha = line._alpha();
        if (alpha <= 0) continue;

        const localVerts = line._buildVertices();
        const { leftSide, rightSide } = buildRibbonSides(
          localVerts,
          line.lineThickness / 2
        );

        // Project every ribbon vertex — filter nulls (clipped), matching SVG export
        const leftProj  = leftSide .map(pt => depthProjectVertex(line, pt.x, pt.y)).filter(Boolean);
        const rightProj = rightSide.map(pt => depthProjectVertex(line, pt.x, pt.y)).filter(Boolean);

        // Skip only if too few vertices survive clipping (mirrors SVG: length < 2 check)
        if (leftProj.length < 2 || rightProj.length < 2) continue;

        // Same winding as SVG/PNG: left forward, right reversed
        const poly = [...leftProj, ...[...rightProj].reverse()];

        rasteriseDepthPolygon(ctx, poly, minDepth, maxDepth, invert, alpha);
      }

      // ── 4. Download ──────────────────────────────────────────────────────────
      offCanvas.toBlob(blob => {
        const url = URL.createObjectURL(blob);
        const ts  = new Date().toISOString().replace(/[:.]/g, '-').slice(0, -5);
        const a   = document.createElement('a');
        a.href     = url;
        a.download = `zigzag-depthmap-${ts}.png`;
        a.click();
        URL.revokeObjectURL(url);
      }, 'image/png');
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // ZIGZAG LINE
    // ═══════════════════════════════════════════════════════════════════════════
    class ZigzagLine {
      constructor({ p, x, y, segmentLength, lineThickness, lineColor, vy }) {
        this.p             = p;
        this.x             = x;
        this.y             = y;
        this.segmentLength = segmentLength;
        this.lineThickness = lineThickness;
        this.lineColor     = [...lineColor];
        this.vy            = vy;
        this.segments      = SEGMENTS;
        this.step          = segmentLength / Math.SQRT2;
        this.totalWidth    = this.segments * this.step;
        this.alive         = true;
        this.age           = 0;
      }

      _buildVertices() {
        const pts = [];
        let x = -this.totalWidth / 2;
        let y = 0;
        pts.push({ x, y });
        for (let i = 0; i < this.segments; i++) {
          x += this.step;
          y += i % 2 === 0 ? this.step : -this.step;
          pts.push({ x, y });
        }
        return pts;
      }

      update(dt) {
        this.age += dt;
        this.y   += this.vy * dt;
        const worldY = this.y - H / 2;
        const dist   = getSpawnDistance();
        if (worldY > dist || worldY < -dist) this.alive = false;
      }

      _alpha() {
        const fadeIn  = Math.min(this.age / FADE_IN_DURATION, 1);
        const spawnDist = getSpawnDistance();
        const worldY    = this.y - H / 2;
        const distToBoundary = Math.min(
          Math.abs(worldY - (-spawnDist)),
          Math.abs(worldY -   spawnDist)
        );
        const fadeOut = Math.min(distToBoundary / FADE_OUT_DISTANCE, 1);
        return Math.min(fadeIn, fadeOut);
      }

      draw(p) {
        const alpha = this._alpha() * 255;
        const { leftSide, rightSide } = buildRibbonSides(
          this._buildVertices(),
          this.lineThickness / 2
        );

        p.push();
        p.translate(this.x - W / 2, this.y - H / 2, 0);
        p.fill(...this.lineColor, alpha);
        p.noStroke();
        p.beginShape();
        for (const pt of leftSide)                        p.vertex(pt.x, pt.y, 0);
        for (let i = rightSide.length - 1; i >= 0; i--)  p.vertex(rightSide[i].x, rightSide[i].y, 0);
        p.endShape(p.CLOSE);
        p.pop();
      }
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // EMITTER
    // ═══════════════════════════════════════════════════════════════════════════
    class Emitter {
      constructor({ p, x, y }) {
        this.p           = p;
        this.x           = x;
        this.y           = y;
        this.lines       = [];
        this.accumulator = 0;
      }

      update(dt) {
        this.accumulator += dt;
        const effectiveRate = params.emitRate * (params.ambientSpeedMaster / 100);
        const interval      = 1 / effectiveRate;
        while (this.accumulator >= interval) {
          this.accumulator -= interval;
          this._emit();
        }
        for (const line of this.lines) line.update(dt);
        this.lines = this.lines.filter(l => l.alive);
      }

      _emit() {
        let thickness = params.lineThickness;
        if (params.randomThickness) {
          const noiseVal  = this.p.noise(noiseOffset);
          const sineVal   = Math.sin(noiseOffset * 2) * 0.5 + 0.5;
          const variation = noiseVal * 0.7 + sineVal * 0.3;
          const minP = params.thicknessRangeMin / 100;
          const maxP = params.thicknessRangeMax / 100;
          thickness = params.lineThickness * (minP + variation * (maxP - minP));
        }

        let speed = params.speed;
        if (params.randomSpeed) {
          const noiseVal  = this.p.noise(noiseOffset * 10);
          const sineVal   = Math.sin(noiseOffset * 15) * 0.5 + 0.5;
          const variation = noiseVal * 0.7 + sineVal * 0.3;
          const minP = params.speedRangeMin / 100;
          const maxP = params.speedRangeMax / 100;
          speed = params.speed * (minP + variation * (maxP - minP));
        }
        speed *= params.ambientSpeedMaster / 100;

        this.lines.push(new ZigzagLine({
          p:             this.p,
          x:             this.x,
          y:             this.y,
          segmentLength: params.segmentLength,
          lineThickness: thickness,
          lineColor:     params.lineColor,
          vy:            -speed
        }));
      }

      draw(p) {
        for (const line of this.lines) line.draw(p);
      }
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // P5 SKETCH FACTORY
    // ═══════════════════════════════════════════════════════════════════════════
    function createSketch(parentId, cameraOffset = 0, isPrimary = true) {
      return function(p) {
        let emitter;
        let lastTime;

        p.setup = function() {
          p.pixelDensity(1);
          const cnv = p.createCanvas(W, H, p.WEBGL);
          cnv.parent(parentId);

          if (!emitterInstance) {
            emitter = new Emitter({ p, x: W / 2, y: H / 2 + getSpawnDistance() });
            emitterInstance = emitter;
          } else {
            emitter = emitterInstance;
            emitter.p = p;
          }

          lastTime = p.millis();

          cnv.elt.addEventListener('contextmenu', e => { e.preventDefault(); return false; });

          cnv.mousePressed((event) => {
            if (params.stereoscopicMode) activeCanvasId = parentId;
            if (p.mouseButton === p.LEFT) {
              camera.isDragging = true;
              camera.isPanning  = false;
              cnv.elt.classList.add('dragging');
            } else if (p.mouseButton === p.RIGHT || p.mouseButton === p.CENTER) {
              camera.isPanning  = true;
              camera.isDragging = false;
              cnv.elt.classList.add('dragging');
            }
            camera.lastMouseX = p.mouseX;
            camera.lastMouseY = p.mouseY;
            return false;
          });

          cnv.mouseReleased(() => {
            camera.isDragging = false;
            camera.isPanning  = false;
            cnv.elt.classList.remove('dragging');
            return false;
          });

          if (params.framebufferMode && !params.stereoscopicMode) updateCanvasSize();
        };

        p.mouseWheel = function(event) {
          const isActive = params.stereoscopicMode ? (parentId === activeCanvasId) : isPrimary;
          if (!isActive) return true;

          const ctrl = document.querySelector('.controls');
          const r    = ctrl.getBoundingClientRect();
          const mx   = event.x || window.event.clientX;
          const my   = event.y || window.event.clientY;
          if (!ctrl.classList.contains('hidden') &&
              mx >= r.left && mx <= r.right &&
              my >= r.top  && my <= r.bottom) return true;

          camera.distance = Math.max(50, Math.min(10000, camera.distance + event.delta * 20));
          params.cameraDistance = camera.distance;
          saveToLocalStorage();
          return false;
        };

        p.windowResized = function() {
          if (!isRecording) updateCanvasSize();
        };

        p.draw = function() {
          p.background(0);

          const isActive = params.stereoscopicMode ? (parentId === activeCanvasId) : isPrimary;
          if (!isRecording && isActive &&
              (p.mouseX !== camera.lastMouseX || p.mouseY !== camera.lastMouseY)) {
            const dx = p.mouseX - camera.lastMouseX;
            const dy = p.mouseY - camera.lastMouseY;
            if (camera.isDragging) {
              camera.rotationY += dx * 0.005;
              camera.rotationX  = p.constrain(camera.rotationX + dy * 0.005, -p.PI / 2, p.PI / 2);
              params.cameraRotationX = camera.rotationX;
              params.cameraRotationY = camera.rotationY;
              saveToLocalStorage();
            } else if (camera.isPanning) {
              const sens = Math.max(0.5, camera.distance / 500);
              camera.offsetX = camera.offsetX + dx * sens;
              camera.offsetY = camera.offsetY + dy * sens;
              params.cameraOffsetX = camera.offsetX;
              params.cameraOffsetY = camera.offsetY;
              saveToLocalStorage();
            }
            camera.lastMouseX = p.mouseX;
            camera.lastMouseY = p.mouseY;
          }

          p.perspective(
            params.fov * p.PI / 180,
            W / H,
            Math.max(0.01, params.near),
            params.far
          );

          let dt;
          if (isRecording) {
            dt = 1 / params.videoFPS;
          } else if (params.stereoscopicMode) {
            if (isPrimary) {
              const now = p.millis();
              dt = (now - sharedLastTime) / 1000;
              sharedLastTime = now;
            } else {
              dt = 0;
            }
          } else {
            const now = p.millis();
            dt = (now - lastTime) / 1000;
            lastTime = now;
          }

          p.push();
          if (params.stereoscopicMode && cameraOffset !== 0) p.translate(cameraOffset, 0, 0);
          p.translate(camera.offsetX, camera.offsetY, 0);
          p.translate(0, 0, -camera.distance);
          p.rotateX(camera.rotationX);
          p.rotateY(camera.rotationY);
          p.rotateZ(params.emitterRotation * p.PI / 180);
          p.scale(params.geometryScale / 100);

          if (!params.stereoscopicMode || isPrimary) {
            noiseOffset += dt * 4;
            emitter.update(dt);
          }

          emitter.draw(p);
          p.pop();
        };
      };
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // SKETCH INIT / TEARDOWN
    // ═══════════════════════════════════════════════════════════════════════════
    function initializeSketches() {
      activeCanvasId = 'left-canvas';

      if (p5Instance)      { p5Instance.remove();      p5Instance      = null; }
      if (p5InstanceRight) { p5InstanceRight.remove();  p5InstanceRight = null; }

      const wrapper = document.getElementById('canvas-wrapper');
      wrapper.innerHTML = '';
      wrapper.classList.remove('stereoscopic');
      emitterInstance = null;
      sharedLastTime  = 0;

      if (params.framebufferMode) {
        W = params.framebufferWidth;
        H = params.framebufferHeight;
      } else if (params.stereoscopicMode) {
        W = Math.floor(window.innerWidth / 2);
        H = window.innerHeight;
      } else {
        W = window.innerWidth;
        H = window.innerHeight;
      }

      if (params.stereoscopicMode) {
        wrapper.classList.add('stereoscopic');

        const container = document.createElement('div');
        container.className = 'stereo-container';

        ['left', 'right'].forEach(side => {
          const eye = document.createElement('div');
          eye.className = 'stereo-eye';
          eye.id        = `${side}-eye-container`;
          const canvasDiv = document.createElement('div');
          canvasDiv.id = `${side}-canvas`;
          eye.appendChild(canvasDiv);
          container.appendChild(eye);
        });

        wrapper.appendChild(container);

        const eyeSep = params.eyeSeparation;
        p5Instance      = new p5(createSketch('left-canvas',  -eyeSep, true));
        p5InstanceRight = new p5(createSketch('right-canvas',  eyeSep, false));

        if (params.framebufferMode) setTimeout(() => updateCanvasSize(), 50);
      } else {
        wrapper.innerHTML = '<div id="mono-canvas"></div>';
        p5Instance      = new p5(createSketch('mono-canvas', 0, true));
        p5InstanceRight = null;

        if (params.framebufferMode) setTimeout(() => updateCanvasSize(), 50);
      }
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // CANVAS SIZE MANAGEMENT
    // ═══════════════════════════════════════════════════════════════════════════
    function updateCanvasSize() {
      if (!p5Instance || isUpdatingCanvasSize) return;
      isUpdatingCanvasSize = true;

      const wrapper = document.getElementById('canvas-wrapper');

      if (params.framebufferMode) {
        W = params.framebufferWidth;
        H = params.framebufferHeight;

        wrapper.classList.add('framebuffer-mode');

        const scaleX = window.innerWidth  / (params.stereoscopicMode ? W * 2 : W);
        const scaleY = window.innerHeight / H;
        const scale  = Math.min(scaleX, scaleY, 1);

        p5Instance.resizeCanvas(W, H);
        if (params.stereoscopicMode && p5InstanceRight) p5InstanceRight.resizeCanvas(W, H);

        if (scale < 1) {
          const cssScale = `scale(${scale})`;
          p5Instance.canvas.style.transform       = cssScale;
          p5Instance.canvas.style.transformOrigin = 'center center';
          if (params.stereoscopicMode && p5InstanceRight) {
            p5InstanceRight.canvas.style.transform       = cssScale;
            p5InstanceRight.canvas.style.transformOrigin = 'center center';
          }
          const wrapperW = params.stereoscopicMode ? W * scale * 2 : W * scale;
          wrapper.style.width  = `${wrapperW}px`;
          wrapper.style.height = `${H * scale}px`;
        } else {
          p5Instance.canvas.style.transform = 'none';
          if (params.stereoscopicMode && p5InstanceRight)
            p5InstanceRight.canvas.style.transform = 'none';
          wrapper.style.width  = `${params.stereoscopicMode ? W * 2 : W}px`;
          wrapper.style.height = `${H}px`;
        }
      } else {
        if (params.stereoscopicMode) {
          W = Math.floor(window.innerWidth / 2);
          H = window.innerHeight;
        } else {
          W = window.innerWidth;
          H = window.innerHeight;
        }
        wrapper.classList.remove('framebuffer-mode');
        wrapper.style.width  = '100%';
        wrapper.style.height = '100%';

        p5Instance.resizeCanvas(W, H);
        if (params.stereoscopicMode && p5InstanceRight) p5InstanceRight.resizeCanvas(W, H);
        p5Instance.canvas.style.transform = 'none';
        if (params.stereoscopicMode && p5InstanceRight)
          p5InstanceRight.canvas.style.transform = 'none';
      }

      if (emitterInstance) {
        emitterInstance.x = W / 2;
        emitterInstance.y = H / 2 + getSpawnDistance();
      }

      isUpdatingCanvasSize = false;
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // SAVE / LOAD
    // ═══════════════════════════════════════════════════════════════════════════
    const STORAGE_KEY = 'zigzagEmitterSettings';

    function saveToLocalStorage() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(params)); }
      catch(e) { console.warn('localStorage save failed:', e); }
    }

    function loadFromLocalStorage() {
      try {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (!stored) return false;
        const loaded = JSON.parse(stored);
        Object.assign(params, loaded);
        if (params.near < 0.01)               params.near        = 0.01;
        if (params.cameraDistance < 50)       params.cameraDistance = 600;
        if (params.cameraOffsetX === undefined) params.cameraOffsetX = 0;
        if (params.cameraOffsetY === undefined) params.cameraOffsetY = 0;
        if (params.depthInvert       === undefined) params.depthInvert       = false;
        return true;
      } catch(e) {
        console.warn('localStorage load failed:', e);
        return false;
      }
    }

    function downloadJSON() {
      const blob = new Blob([JSON.stringify(params, null, 2)], { type: 'application/json' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = `zigzag-emitter-${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function loadJSON(file) {
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const loaded = JSON.parse(e.target.result);
          const prevStereo = params.stereoscopicMode;
          Object.assign(params, loaded);
          if (params.near < 0.01) params.near = 0.01;
          if (prevStereo !== params.stereoscopicMode) initializeSketches();
          syncUIFromParams();
          saveToLocalStorage();
        } catch(err) {
          console.error('JSON load failed:', err);
          alert('Error loading JSON file. Please check the file format.');
        }
      };
      reader.readAsText(file);
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // UI HELPERS
    // ═══════════════════════════════════════════════════════════════════════════

    function getPresetForDimensions(w, h) {
      const presets = {
        '1920x1080': [1920,1080], '1080x1920': [1080,1920],
        '1080x1080': [1080,1080], '1920x1920': [1920,1920],
        '3840x2160': [3840,2160], '2160x3840': [2160,3840],
        '2160x2160': [2160,2160], '3840x3840': [3840,3840],
        '3500x1500': [3500,1500], '1080x1440': [1080,1440]
      };
      for (const [key, [pw, ph]] of Object.entries(presets))
        if (pw === w && ph === h) return key;
      return 'custom';
    }

    function wire(sliderId, displayId, paramKey, decimals = 0, suffix = '') {
      const slider  = document.getElementById(sliderId);
      const display = document.getElementById(displayId);
      const fmt = v => (decimals > 0 ? (+v).toFixed(decimals) : slider.value) + suffix;
      slider.value      = params[paramKey];
      display.textContent = fmt(params[paramKey]);
      slider.addEventListener('input', () => {
        params[paramKey] = parseFloat(slider.value);
        display.textContent = fmt(slider.value);
        saveToLocalStorage();
      });
    }

    function syncUIFromParams() {
      const sliders = [
        { id: 'seg-length',           key: 'segmentLength'    },
        { id: 'thickness',            key: 'lineThickness',     decimals: 1 },
        { id: 'emit-rate',            key: 'emitRate'          },
        { id: 'speed',                key: 'speed'             },
        { id: 'fov',                  key: 'fov',               decimals: 2 },
        { id: 'near',                 key: 'near',              decimals: 2 },
        { id: 'far',                  key: 'far'               },
        { id: 'emitter-rotation',     key: 'emitterRotation'   },
        { id: 'geometry-scale',       key: 'geometryScale'     },
        { id: 'eye-separation',       key: 'eyeSeparation'     },
        { id: 'video-duration',       key: 'videoDuration'     },
        { id: 'video-fps',            key: 'videoFPS'          },
        { id: 'thickness-range-min',  key: 'thicknessRangeMin', suffix: '%' },
        { id: 'thickness-range-max',  key: 'thicknessRangeMax', suffix: '%' },
        { id: 'speed-range-min',      key: 'speedRangeMin',     suffix: '%' },
        { id: 'speed-range-max',      key: 'speedRangeMax',     suffix: '%' },
        { id: 'ambient-speed-master', key: 'ambientSpeedMaster' }
      ];
      sliders.forEach(({ id, key, decimals = 0, suffix = '' }) => {
        const slider  = document.getElementById(id);
        const valId   = id + '-val';
        const display = document.getElementById(valId);
        if (!slider || params[key] === undefined) return;
        slider.value        = params[key];
        if (display) display.textContent = (decimals ? (+params[key]).toFixed(decimals) : params[key]) + suffix;
      });

      document.getElementById('stereoscopic-mode').checked = params.stereoscopicMode;
      document.getElementById('framebuffer-mode').checked  = params.framebufferMode;
      document.getElementById('random-thickness').checked  = params.randomThickness;
      document.getElementById('random-speed').checked      = params.randomSpeed;
      document.getElementById('depth-invert').checked      = params.depthInvert;

      document.getElementById('framebuffer-width').value  = params.framebufferWidth;
      document.getElementById('framebuffer-height').value = params.framebufferHeight;

      const preset = getPresetForDimensions(params.framebufferWidth, params.framebufferHeight);
      params.framebufferPreset = preset;
      document.getElementById('framebuffer-preset').value = preset;

      document.querySelectorAll('[data-format]').forEach(btn =>
        btn.classList.toggle('active', btn.dataset.format === params.videoFormat));

      const colorStr = params.lineColor.join(',');
      document.querySelectorAll('.swatch').forEach(swatch =>
        swatch.classList.toggle('active', swatch.dataset.color === colorStr));

      camera.rotationX = params.cameraRotationX;
      camera.rotationY = params.cameraRotationY;
      camera.distance  = Math.max(50, params.cameraDistance);
      camera.offsetX   = params.cameraOffsetX || 0;
      camera.offsetY   = params.cameraOffsetY || 0;

      if (p5Instance?.canvas) updateCanvasSize();
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // BOOT
    // ═══════════════════════════════════════════════════════════════════════════
    const hadSavedSettings = loadFromLocalStorage();
    if (hadSavedSettings && params.stereoscopicMode) initializeSketches();

    // Standard sliders
    wire('seg-length',           'seg-length-val',           'segmentLength');
    wire('thickness',            'thickness-val',            'lineThickness', 1);
    wire('emit-rate',            'emit-rate-val',            'emitRate');
    wire('speed',                'speed-val',                'speed');
    wire('emitter-rotation',     'emitter-rotation-val',     'emitterRotation');
    wire('geometry-scale',       'geometry-scale-val',       'geometryScale');
    wire('ambient-speed-master', 'ambient-speed-master-val', 'ambientSpeedMaster');
    wire('video-duration',       'video-duration-val',       'videoDuration');
    wire('video-fps',            'video-fps-val',            'videoFPS');

    document.getElementById('depth-invert').addEventListener('change', e => {
      params.depthInvert = e.target.checked;
      saveToLocalStorage();
    });

    // FOV with distance compensation
    {
      const fovSlider  = document.getElementById('fov');
      const fovDisplay = document.getElementById('fov-val');
      fovSlider.value = params.fov;
      fovDisplay.textContent = params.fov.toFixed(2);
      fovSlider.addEventListener('input', () => {
        const oldFOV    = params.fov;
        const newFOV    = parseFloat(fovSlider.value);
        const oldFOVRad = oldFOV * Math.PI / 180;
        const newFOVRad = newFOV * Math.PI / 180;
        const ratio     = Math.tan(oldFOVRad / 2) / Math.tan(newFOVRad / 2);
        const newDist   = Math.max(50, Math.min(10000, camera.distance * ratio));
        params.fov          = newFOV;
        camera.distance     = newDist;
        params.cameraDistance = newDist;
        fovDisplay.textContent = newFOV.toFixed(2);
        saveToLocalStorage();
      });
    }

    // Near / Far
    {
      const nearSlider  = document.getElementById('near');
      const farSlider   = document.getElementById('far');
      const nearDisplay = document.getElementById('near-val');
      const farDisplay  = document.getElementById('far-val');

      nearSlider.value = params.near;
      farSlider.value  = params.far;
      nearDisplay.textContent = params.near.toFixed(2);
      farDisplay.textContent  = params.far;

      nearSlider.addEventListener('input', () => {
        params.near = Math.max(0.01, parseFloat(nearSlider.value));
        nearDisplay.textContent = params.near.toFixed(2);
        saveToLocalStorage();
      });
      farSlider.addEventListener('input', () => {
        params.far = parseFloat(farSlider.value);
        farDisplay.textContent = params.far;
        saveToLocalStorage();
      });
    }

    // Thickness range
    {
      const tMin    = document.getElementById('thickness-range-min');
      const tMax    = document.getElementById('thickness-range-max');
      const tMinVal = document.getElementById('thickness-range-min-val');
      const tMaxVal = document.getElementById('thickness-range-max-val');
      tMin.value = params.thicknessRangeMin; tMinVal.textContent = params.thicknessRangeMin + '%';
      tMax.value = params.thicknessRangeMax; tMaxVal.textContent = params.thicknessRangeMax + '%';
      tMin.addEventListener('input', () => {
        if (+tMin.value > +tMax.value) tMin.value = tMax.value;
        params.thicknessRangeMin = +tMin.value;
        tMinVal.textContent = tMin.value + '%';
        saveToLocalStorage();
      });
      tMax.addEventListener('input', () => {
        if (+tMax.value < +tMin.value) tMax.value = tMin.value;
        params.thicknessRangeMax = +tMax.value;
        tMaxVal.textContent = tMax.value + '%';
        saveToLocalStorage();
      });
    }

    // Speed range
    {
      const sMin    = document.getElementById('speed-range-min');
      const sMax    = document.getElementById('speed-range-max');
      const sMinVal = document.getElementById('speed-range-min-val');
      const sMaxVal = document.getElementById('speed-range-max-val');
      sMin.value = params.speedRangeMin; sMinVal.textContent = params.speedRangeMin + '%';
      sMax.value = params.speedRangeMax; sMaxVal.textContent = params.speedRangeMax + '%';
      sMin.addEventListener('input', () => {
        if (+sMin.value > +sMax.value) sMin.value = sMax.value;
        params.speedRangeMin = +sMin.value;
        sMinVal.textContent = sMin.value + '%';
        saveToLocalStorage();
      });
      sMax.addEventListener('input', () => {
        if (+sMax.value < +sMin.value) sMax.value = sMin.value;
        params.speedRangeMax = +sMax.value;
        sMaxVal.textContent = sMax.value + '%';
        saveToLocalStorage();
      });
    }

    // Checkboxes
    document.getElementById('random-thickness').addEventListener('change', e => { params.randomThickness = e.target.checked; saveToLocalStorage(); });
    document.getElementById('random-speed').addEventListener('change',     e => { params.randomSpeed     = e.target.checked; saveToLocalStorage(); });

    // Stereoscopic
    document.getElementById('stereoscopic-mode').addEventListener('change', e => {
      params.stereoscopicMode = e.target.checked;
      initializeSketches();
      if (params.framebufferMode) setTimeout(() => updateCanvasSize(), 100);
      saveToLocalStorage();
    });

    document.getElementById('eye-separation').addEventListener('input', e => {
      params.eyeSeparation = parseFloat(e.target.value);
      document.getElementById('eye-separation-val').textContent = params.eyeSeparation;
      if (params.stereoscopicMode) initializeSketches();
      saveToLocalStorage();
    });

    // Framebuffer
    document.getElementById('framebuffer-mode').addEventListener('change', e => {
      params.framebufferMode = e.target.checked;
      updateCanvasSize();
      saveToLocalStorage();
    });

    document.getElementById('framebuffer-preset').addEventListener('change', e => {
      params.framebufferPreset = e.target.value;
      if (e.target.value !== 'custom') {
        const [w, h] = e.target.value.split('x').map(Number);
        params.framebufferWidth  = w;
        params.framebufferHeight = h;
        document.getElementById('framebuffer-width').value  = w;
        document.getElementById('framebuffer-height').value = h;
        if (params.framebufferMode) updateCanvasSize();
      }
      saveToLocalStorage();
    });

    document.getElementById('framebuffer-width').addEventListener('input', e => {
      params.framebufferWidth = Math.max(320, parseInt(e.target.value) || 1920);
      if (params.framebufferMode) updateCanvasSize();
      const preset = getPresetForDimensions(params.framebufferWidth, params.framebufferHeight);
      params.framebufferPreset = preset;
      document.getElementById('framebuffer-preset').value = preset;
      saveToLocalStorage();
    });

    document.getElementById('framebuffer-height').addEventListener('input', e => {
      params.framebufferHeight = Math.max(240, parseInt(e.target.value) || 1080);
      if (params.framebufferMode) updateCanvasSize();
      const preset = getPresetForDimensions(params.framebufferWidth, params.framebufferHeight);
      params.framebufferPreset = preset;
      document.getElementById('framebuffer-preset').value = preset;
      saveToLocalStorage();
    });

    // Color swatches
    document.querySelectorAll('.swatch').forEach(s => {
      s.addEventListener('click', () => {
        document.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
        s.classList.add('active');
        params.lineColor = s.dataset.color.split(',').map(Number);
        saveToLocalStorage();
      });
    });

    // Video format
    document.querySelectorAll('[data-format]').forEach(b => {
      b.addEventListener('click', () => {
        document.querySelectorAll('[data-format]').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        params.videoFormat = b.dataset.format;
        saveToLocalStorage();
      });
    });

    // Collapsible sections
    document.querySelectorAll('.section-header').forEach(header => {
      header.addEventListener('click', () => {
        const content = header.nextElementSibling;
        const open    = content.classList.toggle('expanded');
        header.classList.toggle('active', open);
      });
    });

    // ═══════════════════════════════════════════════════════════════════════════
    // KEYBOARD SHORTCUT ACTIONS
    // ═══════════════════════════════════════════════════════════════════════════
    // All actions referenced by the KEYBOARD_SHORTCUTS configuration
    
    function toggleControls() {
      document.querySelector('.controls').classList.toggle('hidden');
      document.body.classList.toggle('ui-hidden');
    }
    
    function toggleFullscreen() {
      if (!document.fullscreenElement)
        document.body.requestFullscreen().catch(() => {});
      else
        document.exitFullscreen();
    }
    
    function exportPNG() {
      document.getElementById('export-png')?.click();
    }
    
    function exportSVG() {
      document.getElementById('export-svg')?.click();
    }
    
    function toggleVideoRecording() {
      if (!isRecording) startVideoRecording();
      else stopVideoRecording();
    }
    
    function resetCamera() {
      camera.rotationX = -0.3;
      camera.rotationY = 0;
      camera.offsetX = 0;
      camera.offsetY = 0;
      params.cameraRotationX = camera.rotationX;
      params.cameraRotationY = camera.rotationY;
      params.cameraOffsetX = camera.offsetX;
      params.cameraOffsetY = camera.offsetY;
      saveToLocalStorage();
    }
    
    function resetZoom() {
      camera.distance = 600;
      params.cameraDistance = 600;
      saveToLocalStorage();
    }
    
    function toggleRandomThickness() {
      params.randomThickness = !params.randomThickness;
      document.getElementById('random-thickness').checked = params.randomThickness;
      saveToLocalStorage();
    }
    
    function toggleRandomSpeed() {
      params.randomSpeed = !params.randomSpeed;
      document.getElementById('random-speed').checked = params.randomSpeed;
      saveToLocalStorage();
    }
    
    function toggleStereoMode() {
      params.stereoscopicMode = !params.stereoscopicMode;
      document.getElementById('stereoscopic-mode').checked = params.stereoscopicMode;
      initializeSketches();
      if (params.framebufferMode) setTimeout(() => updateCanvasSize(), 100);
      saveToLocalStorage();
    }
    
    function toggleFramebuffer() {
      params.framebufferMode = !params.framebufferMode;
      document.getElementById('framebuffer-mode').checked = params.framebufferMode;
      updateCanvasSize();
      saveToLocalStorage();
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // KEYBOARD SHORTCUT HANDLER
    // ═══════════════════════════════════════════════════════════════════════════
    // Single centralized keyboard event handler that dispatches to actions
    // Supports modifier keys: Ctrl (or Cmd on Mac), Shift, Alt
    document.addEventListener('keydown', e => {
      // Skip if user is typing in an input field
      if (e.target.matches('input, textarea, select')) return;
      
      // Find matching shortcut
      const shortcut = KEYBOARD_SHORTCUTS.find(sc => {
        // Check if key matches (case-insensitive for letters)
        const keyMatches = sc.key.toLowerCase() === e.key.toLowerCase();
        if (!keyMatches) return false;
        
        // Check modifier keys (default to false if not specified)
        const ctrlMatch = (sc.ctrl || false) === (e.ctrlKey || e.metaKey); // metaKey = Cmd on Mac
        const shiftMatch = (sc.shift || false) === e.shiftKey;
        const altMatch = (sc.alt || false) === e.altKey;
        
        return ctrlMatch && shiftMatch && altMatch;
      });
      
      if (shortcut) {
        // CRITICAL: Prevent browser default BEFORE calling the action
        // This stops Ctrl+S from saving the page, Ctrl+P from printing, etc.
        if (shortcut.preventDefault) {
          e.preventDefault();
          e.stopPropagation();
        }
        
        // Call the action function by name
        const actionName = shortcut.action;
        if (typeof window[actionName] === 'function') {
          window[actionName]();
        }
      }
    });
    
    // UI button bindings
    document.getElementById('hide-controls-btn').addEventListener('click', toggleControls);
    document.getElementById('fullscreen-btn').addEventListener('click', toggleFullscreen);

    // Save / Load JSON
    document.getElementById('save-json').addEventListener('click', downloadJSON);
    document.getElementById('load-json').addEventListener('click', () => document.getElementById('load-json-input').click());
    document.getElementById('load-json-input').addEventListener('change', e => {
      const file = e.target.files[0];
      if (file) loadJSON(file);
      e.target.value = '';
    });

    // ── DEPTH MAP EXPORT BUTTON ───────────────────────────────────────────────
    document.getElementById('export-depth-map').addEventListener('click', exportDepthMap);

    // Sync UI and start sketches
    syncUIFromParams();
    if (!p5Instance) initializeSketches();

    // ═══════════════════════════════════════════════════════════════════════════
    // VIDEO RECORDING (CCapture.js)
    // ═══════════════════════════════════════════════════════════════════════════
    document.getElementById('export-video').addEventListener('click', () => {
      if (!isRecording) startVideoRecording();
    });

    function startVideoRecording() {
      if (isRecording) return;
      isRecording          = true;
      recordingFrameCount  = 0;
      recordingTotalFrames = params.videoDuration * params.videoFPS;

      document.querySelectorAll('.controls input, .controls button').forEach(el => {
        el.disabled = true; el.style.opacity = '0.3'; el.style.pointerEvents = 'none';
      });
      const btn = document.getElementById('export-video');
      btn.style.opacity = '1'; btn.disabled = true;
      btn.textContent   = '⬤ Recording...';
      btn.style.background = '#8b2d2d';
      const progress = document.getElementById('video-progress');
      progress.style.display = 'block';
      progress.textContent   = 'Recording: 0%';

      if (emitterInstance) { emitterInstance.lines = []; emitterInstance.accumulator = 0; }

      capturer = new CCapture({
        format:      params.videoFormat === 'mp4' ? 'webm' : params.videoFormat,
        framerate:   params.videoFPS,
        name:        'zigzag-emitter',
        quality:     95,
        verbose:     false,
        display:     false,
        autoSaveTime: 0,
        workersPath: 'https://cdn.jsdelivr.net/npm/ccapture.js@1.1.0/build/'
      });

      p5Instance.noLoop();
      capturer.start();
      renderVideoFrame();
    }

    function renderVideoFrame() {
      if (!isRecording || recordingFrameCount >= recordingTotalFrames) {
        if (isRecording) stopVideoRecording();
        return;
      }
      p5Instance.redraw();
      capturer.capture(p5Instance.canvas);
      recordingFrameCount++;

      const progress = Math.round((recordingFrameCount / recordingTotalFrames) * 100);
      document.getElementById('video-progress').textContent = `Recording: ${progress}%`;
      setTimeout(renderVideoFrame, 0);
    }

    function stopVideoRecording() {
      if (!isRecording) return;
      document.getElementById('video-progress').textContent = 'Encoding video...';
      capturer.stop();
      capturer.save();
      isRecording = false;
      recordingFrameCount = 0;

      document.querySelectorAll('.controls input, .controls button').forEach(el => {
        el.disabled = false; el.style.opacity = '1'; el.style.pointerEvents = 'auto';
      });
      const btn = document.getElementById('export-video');
      btn.disabled = false; btn.textContent = 'Export Video'; btn.style.background = '#5f1a1a';
      document.getElementById('video-progress').style.display = 'none';

      p5Instance.frameRate(60);
      p5Instance.loop();
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // SVG EXPORT
    // ═══════════════════════════════════════════════════════════════════════════
    document.getElementById('export-svg').addEventListener('click', () => {
      if (!p5Instance || !emitterInstance) return;

      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('xmlns',   'http://www.w3.org/2000/svg');
      svg.setAttribute('width',    W);
      svg.setAttribute('height',   H);
      svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

      const rotX = (x,y,z,a) => ({ x, y: y*Math.cos(a)-z*Math.sin(a), z: y*Math.sin(a)+z*Math.cos(a) });
      const rotY = (x,y,z,a) => ({ x: x*Math.cos(a)+z*Math.sin(a), y, z: -x*Math.sin(a)+z*Math.cos(a) });
      const rotZ = (x,y,z,a) => ({ x: x*Math.cos(a)-y*Math.sin(a), y: x*Math.sin(a)+y*Math.cos(a), z });

      const fovRad         = params.fov * Math.PI / 180;
      const defaultCameraZ = (H / 2) / Math.tan(fovRad / 2);
      const totalDistance  = defaultCameraZ + camera.distance;

      function projectPoint(x, y, z) {
        let pt = rotZ(x, y, z, params.emitterRotation * Math.PI / 180);
        pt = rotY(pt.x, pt.y, pt.z, camera.rotationY);
        pt = rotX(pt.x, pt.y, pt.z, camera.rotationX);
        pt.z -= totalDistance;
        if (pt.z >= -params.near || pt.z <= -params.far) return null;
        const s = defaultCameraZ / -pt.z;
        return { x: pt.x * s + W / 2, y: pt.y * s + H / 2 };
      }

      const scaleVal = params.geometryScale / 100;

      emitterInstance.lines.forEach(line => {
        const localVerts = line._buildVertices();
        const { leftSide: leftLocal, rightSide: rightLocal } =
          buildRibbonSides(localVerts, line.lineThickness / 2);

        const toScreen = localPts => localPts
          .map(pt => ({
            x: ((line.x - W / 2) + pt.x) * scaleVal,
            y: ((line.y - H / 2) + pt.y) * scaleVal,
            z: 0
          }))
          .map(pt => projectPoint(pt.x, pt.y, pt.z))
          .filter(Boolean);

        const leftScreen  = toScreen(leftLocal);
        const rightScreen = toScreen(rightLocal);
        if (leftScreen.length < 2 || rightScreen.length < 2) return;

        const alpha   = line._alpha();
        const polygon = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
        const pts     = [...leftScreen, ...rightScreen.reverse()]
          .map(p => `${p.x.toFixed(2)},${p.y.toFixed(2)}`).join(' ');
        polygon.setAttribute('points', pts);
        polygon.setAttribute('fill',   `rgba(${line.lineColor.join(',')},${alpha})`);
        polygon.setAttribute('stroke', 'none');
        svg.appendChild(polygon);
      });

      const blob = new Blob(
        [new XMLSerializer().serializeToString(svg)],
        { type: 'image/svg+xml' }
      );
      const url  = URL.createObjectURL(blob);
      const ts   = new Date().toISOString().replace(/[:.]/g, '-').slice(0, -5);
      const a    = document.createElement('a');
      a.href = url; a.download = `zigzag-emitter-${ts}.svg`; a.click();
      URL.revokeObjectURL(url);
    });

    // ═══════════════════════════════════════════════════════════════════════════
    // PNG EXPORT
    // ═══════════════════════════════════════════════════════════════════════════
    document.getElementById('export-png').addEventListener('click', () => {
      if (!p5Instance) return;
      p5Instance.canvas.toBlob(blob => {
        const url = URL.createObjectURL(blob);
        const ts  = new Date().toISOString().replace(/[:.]/g, '-').slice(0, -5);
        const a   = document.createElement('a');
        a.href = url; a.download = `zigzag-emitter-${ts}.png`; a.click();
        URL.revokeObjectURL(url);
      }, 'image/png');
    });

    // ═══════════════════════════════════════════════════════════════════════════
    // HOVER EFFECTS
    // ═══════════════════════════════════════════════════════════════════════════
    function hoverEffect(id, hoverBg, normalBg) {
      const el = document.getElementById(id);
      el.addEventListener('mouseenter', () => { el.style.background = hoverBg;  el.style.transform = 'scale(1.02)'; });
      el.addEventListener('mouseleave', () => { el.style.background = normalBg; el.style.transform = 'scale(1)'; });
    }
    hoverEffect('export-svg', '#267526', '#1a5f1a');
    hoverEffect('export-png', '#26527a', '#1a3a5f');

    const videoBtn = document.getElementById('export-video');
    videoBtn.addEventListener('mouseenter', () => { if (!isRecording) { videoBtn.style.background = '#752626'; videoBtn.style.transform = 'scale(1.02)'; } });
    videoBtn.addEventListener('mouseleave', () => { if (!isRecording) { videoBtn.style.background = '#5f1a1a'; videoBtn.style.transform = 'scale(1)'; } });

    // ═══════════════════════════════════════════════════════════════════════════
    // ABOUT BUTTONS & LANGUAGE FILTER
    // ═══════════════════════════════════════════════════════════════════════════
    document.getElementById('doc-manual-en').addEventListener('click', () => window.open('docs/markdown-viewer.html?doc=User-Manual.md', '_blank'));
    document.getElementById('doc-manual-fr').addEventListener('click', () => window.open('docs/markdown-viewer.html?doc=User-Manual-fr.md', '_blank'));
    document.getElementById('doc-readme-en').addEventListener('click', () => window.open('docs/markdown-viewer.html?doc=README.md', '_blank'));
    document.getElementById('doc-readme-fr').addEventListener('click', () => window.open('docs/markdown-viewer.html?doc=README-fr.md', '_blank'));
    document.getElementById('doc-tech-en').addEventListener('click',   () => window.open('docs/markdown-viewer.html?doc=Documentation.md', '_blank'));
    document.getElementById('doc-tech-fr').addEventListener('click',   () => window.open('docs/markdown-viewer.html?doc=Documentation-fr.md', '_blank'));
    document.getElementById('doc-projection-en').addEventListener('click', () => window.open('docs/markdown-viewer.html?doc=Projection-Matrix-Guide.md', '_blank'));
    document.getElementById('doc-projection-fr').addEventListener('click', () => window.open('docs/markdown-viewer.html?doc=Projection-Matrix-Guide-fr.md', '_blank'));

    // Language filter functionality
    document.querySelectorAll('.lang-filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const selectedLang = btn.dataset.langFilter;
        
        // Update active state on filter buttons
        document.querySelectorAll('.lang-filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        // Show/hide documentation buttons based on language
        document.querySelectorAll('.about-btn[data-lang]').forEach(docBtn => {
          if (docBtn.dataset.lang === selectedLang) {
            docBtn.classList.remove('hidden');
          } else {
            docBtn.classList.add('hidden');
          }
        });
      });
    });

  </script>
