<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Documentation Viewer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, Helvetica, sans-serif;
      line-height: 1.6;
      color: #e0e0e0;
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
      padding: 20px;
      min-height: 100vh;
      text-align: left;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: rgba(30, 30, 30, 0.95);
      padding: 40px 50px;
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .back-btn {
      display: inline-block;
      margin-bottom: 20px;
      padding: 8px 16px;
      background: rgba(80, 120, 255, 0.2);
      border: 1px solid #5078ff;
      border-radius: 4px;
      color: #5078ff;
      text-decoration: none;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .back-btn:hover {
      background: rgba(80, 120, 255, 0.3);
      transform: translateX(-2px);
    }

    #content {
      color: #e0e0e0;
      text-align: left;
    }

    #content h1 {
      font-size: 2.5rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 0.5rem;
      padding-bottom: 0.3rem;
      border-bottom: 3px solid #5078ff;
    }

    #content h2 {
      font-size: 2rem;
      font-weight: 600;
      color: #f0f0f0;
      margin-top: 2.5rem;
      margin-bottom: 1rem;
      padding-bottom: 0.3rem;
      border-bottom: 2px solid #444;
    }

    #content h3 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #e0e0e0;
      margin-top: 2rem;
      margin-bottom: 0.8rem;
    }

    #content h4 {
      font-size: 1.2rem;
      font-weight: 600;
      color: #d0d0d0;
      margin-top: 1.5rem;
      margin-bottom: 0.6rem;
    }

    #content h5 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #c0c0c0;
      margin-top: 1.2rem;
      margin-bottom: 0.5rem;
    }

    #content h6 {
      font-size: 1rem;
      font-weight: 600;
      color: #b0b0b0;
      margin-top: 1rem;
      margin-bottom: 0.5rem;
    }

    #content p {
      margin-bottom: 1rem;
      line-height: 1.7;
    }

    #content a {
      color: #5078ff;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }

    #content a:hover {
      border-bottom-color: #5078ff;
    }

    #content ul, #content ol {
      margin: 1rem 0 1rem 2rem;
      line-height: 1.8;
    }

    #content li {
      margin-bottom: 0.5rem;
    }

    #content code {
      background: rgba(80, 120, 255, 0.15);
      border: 1px solid rgba(80, 120, 255, 0.3);
      padding: 2px 6px;
      border-radius: 3px;
      font-family: 'Monaco', 'Consolas', 'Courier New', monospace;
      font-size: 0.9em;
      color: #8fb4ff;
    }

    #content pre {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid #333;
      border-radius: 5px;
      padding: 16px;
      margin: 1.5rem 0;
      overflow-x: auto;
      line-height: 1.5;
    }

    #content pre code {
      background: none;
      border: none;
      padding: 0;
      color: #b0e0ff;
      font-size: 0.9rem;
    }

    #content blockquote {
      border-left: 4px solid #5078ff;
      padding-left: 16px;
      margin: 1.5rem 0;
      color: #b0b0b0;
      font-style: italic;
      background: rgba(80, 120, 255, 0.05);
      padding: 12px 16px;
      border-radius: 0 4px 4px 0;
    }

    #content table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.5rem 0;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 5px;
      overflow: hidden;
    }

    #content table th,
    #content table td {
      padding: 12px 15px;
      text-align: left;
      border-bottom: 1px solid #333;
    }

    #content table th {
      background: rgba(80, 120, 255, 0.2);
      color: #ffffff;
      font-weight: 600;
      border-bottom: 2px solid #5078ff;
    }

    #content table tr:hover {
      background: rgba(255, 255, 255, 0.03);
    }

    #content hr {
      border: none;
      border-top: 2px solid #333;
      margin: 2rem 0;
    }

    #content img {
      max-width: 100%;
      height: auto;
      border-radius: 5px;
      margin: 1rem 0;
      border: 1px solid #333;
    }

    #content strong {
      color: #ffffff;
      font-weight: 600;
    }

    #content em {
      color: #d0d0d0;
      font-style: italic;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #888;
      font-size: 1.2rem;
    }

    .error {
      background: rgba(255, 80, 80, 0.1);
      border: 1px solid rgba(255, 80, 80, 0.3);
      color: #ff8080;
      padding: 20px;
      border-radius: 5px;
      margin: 20px 0;
    }

    @media (max-width: 768px) {
      .container {
        padding: 20px 25px;
      }

      #content h1 {
        font-size: 2rem;
      }

      #content h2 {
        font-size: 1.6rem;
      }

      #content h3 {
        font-size: 1.3rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="javascript:window.close()" class="back-btn">← Close</a>
    <div id="content" class="loading">Loading documentation...</div>
  </div>

  <!-- Marked.js from CDN for markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
  
  <script>
    // Get the document parameter from URL
    const urlParams = new URLSearchParams(window.location.search);
    const docFile = urlParams.get('doc') || 'README.md';
    
    // Configure marked options
    marked.setOptions({
      breaks: true,
      gfm: true, // GitHub Flavored Markdown
      tables: true,
      headerIds: true
    });

    // Check if we're running on local file system (file://) or web server (http://)
    const isLocalFile = window.location.protocol === 'file:';

    if (isLocalFile) {
      // Running from file system - open .md file directly
      document.getElementById('content').innerHTML = `
        <div style="padding: 20px; text-align: center;">
          <h2>Opening Markdown File...</h2>
          <p>Your markdown file should open in a new tab.</p>
          <p>If it doesn't, <a href="${docFile}" target="_blank" style="color: #5078ff;">click here to open ${docFile}</a></p>
          <hr style="margin: 30px 0; border-color: #333;">
          <p style="color: #888; font-size: 0.9rem;">
            <strong>Tip:</strong> For styled documentation, serve this folder with a local web server:<br>
            <code style="background: #1a1a1a; padding: 5px 10px; border-radius: 3px; margin-top: 10px; display: inline-block;">python3 -m http.server 8000</code><br>
            Then open: <code style="background: #1a1a1a; padding: 5px 10px; border-radius: 3px;">http://localhost:8000/ZigzagEmitter_12.html</code>
          </p>
        </div>
      `;
      // Automatically open the markdown file
      window.location.href = docFile;
    } else {
      // Running from web server - fetch and render with styling
      fetch(docFile)
        .then(response => {
          if (!response.ok) {
            throw new Error(`Failed to load ${docFile}`);
          }
          return response.text();
        })
        .then(markdown => {
          // Convert markdown to HTML
          const html = marked.parse(markdown);
          document.getElementById('content').innerHTML = html;
          
          // Update page title based on first H1
          const firstH1 = document.querySelector('#content h1');
          if (firstH1) {
            document.title = firstH1.textContent + ' - Documentation';
          }
        })
        .catch(error => {
          document.getElementById('content').innerHTML = `
            <div class="error">
              <h2>Error Loading Documentation</h2>
              <p><strong>Could not load:</strong> ${docFile}</p>
              <p>${error.message}</p>
              <p>Please make sure the file exists in the docs folder.</p>
            </div>
          `;
        });
    }
  </script>
</body>
</html>
