<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Documentation Viewer</title>
  <link rel="stylesheet" href="../css/markdown-viewer.css">
</head>
<body>
  <a href="javascript:window.close()" class="back-btn">← Close</a>
  
  <!-- Language Switcher -->
  <div class="language-switcher">
    <button id="lang-en" class="lang-btn active" data-lang="en">EN</button>
    <button id="lang-fr" class="lang-btn" data-lang="fr">FR</button>
  </div>
  
  <!-- Left Navigation: H2 Sections -->
  <nav id="left-nav" class="left-sidebar">
    <div class="nav-header" id="left-nav-header">Sections</div>
    <ul id="left-nav-list"></ul>
  </nav>
  
  <!-- Main Content -->
  <div class="container">
    <div id="content" class="loading">
      <span class="loading-en">Loading documentation...</span>
      <span class="loading-fr" style="display:none;">Chargement de la documentation...</span>
    </div>
  </div>
  
  <!-- Right Navigation: H3 Subsections -->
  <nav id="right-nav" class="right-sidebar">
    <div class="nav-header" id="right-nav-header">In This Section</div>
    <ul id="right-nav-list"></ul>
  </nav>

  <!-- External Libraries (offline-ready) -->
  <script src="../lib/marked.min.js" onerror="this.onerror=null; this.src='https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js'"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.0/dist/mermaid.min.js"></script>
  
  <script>
    // Get the document parameter from URL
    const urlParams = new URLSearchParams(window.location.search);
    // Language-aware doc path
    let docFile = urlParams.get('doc');
    if (!docFile) {
      // Default to English README at root
      docFile = '../README.md';
    } else if (!docFile.includes('/')) {
      // If only a filename is given, guess language by prefix
      const lang = urlParams.get('lang');
      if (lang === 'fr' || docFile.endsWith('-fr.md')) {
        docFile = 'French/' + docFile;
      } else {
        docFile = 'English/' + docFile;
      }
    }
    
    // Configure marked options
    marked.setOptions({
      breaks: true,
      gfm: true, // GitHub Flavored Markdown
      tables: true,
      headerIds: true,
      mangle: false // Don't mangle IDs
    });

    // Check if we're running on local file system (file://) or web server (http://)
    const isLocalFile = window.location.protocol === 'file:';
    
    // Update loading message based on language
    const currentLang = urlParams.get('lang') || (docFile.includes('-fr.md') || docFile.includes('French/') ? 'fr' : 'en');
    if (currentLang === 'fr') {
      document.querySelector('.loading-en').style.display = 'none';
      document.querySelector('.loading-fr').style.display = 'block';
    }

    if (isLocalFile) {
      // Running from file system - open .md file directly
      document.getElementById('content').innerHTML = `
        <div style="padding: 20px; text-align: center;">
          <h2>Opening Markdown File...</h2>
          <p>Your markdown file should open in a new tab.</p>
          <p>If it doesn't, <a href="${docFile}" target="_blank" style="color: #5078ff;">click here to open ${docFile}</a></p>
          <hr style="margin: 30px 0; border-color: #333;">
          <p style="color: #888; font-size: 0.9rem;">
            <strong>Tip:</strong> For styled documentation, serve this folder with a local web server:<br>
            <code style="background: #1a1a1a; padding: 5px 10px; border-radius: 3px; margin-top: 10px; display: inline-block;">python3 -m http.server 8000</code><br>
            Then open: <code style="background: #1a1a1a; padding: 5px 10px; border-radius: 3px;">http://localhost:8000/index.html</code>
          </p>
        </div>
      `;
      // Automatically open the markdown file
      window.location.href = docFile;
    } else {
      // Running from web server - fetch and render with styling
      fetch(docFile)
        .then(response => {
          if (!response.ok) {
            throw new Error(`Failed to load ${docFile}`);
          }
          return response.text();
        })
        .then(markdown => {
          // Convert markdown to HTML
          const html = marked.parse(markdown);
          document.getElementById('content').innerHTML = html;
          
          // Update page title based on first H1
          const firstH1 = document.querySelector('#content h1');
          if (firstH1) {
            document.title = firstH1.textContent + ' - Documentation';
          }
          
          // Build navigation menus
          buildNavigation();
          
          // Setup scroll spy
          setupScrollSpy();
          
          // Initialize Mermaid diagrams
          mermaid.initialize({ 
            startOnLoad: false,
            theme: 'dark',
            themeVariables: {
              primaryColor: '#2d3748',
              primaryTextColor: '#fff',
              primaryBorderColor: '#4299e1',
              lineColor: '#4299e1',
              secondaryColor: '#374151',
              tertiaryColor: '#1a202c',
              background: '#1a202c',
              mainBkg: '#2d3748',
              secondBkg: '#374151',
              tertiaryBkg: '#1a202c',
              fontFamily: 'system-ui, -apple-system, sans-serif'
            }
          });
          
          // Find and render all mermaid diagrams
          document.querySelectorAll('pre code.language-mermaid').forEach((block, index) => {
            const pre = block.parentElement;
            const mermaidDiv = document.createElement('div');
            mermaidDiv.className = 'mermaid';
            mermaidDiv.textContent = block.textContent;
            mermaidDiv.style.backgroundColor = 'transparent';
            pre.replaceWith(mermaidDiv);
          });
          
          // Render all mermaid diagrams
          mermaid.run();
          
          // Setup anchor link handling
          document.querySelectorAll('#content a[href^="#"]').forEach(link => {
            link.addEventListener('click', function(e) {
              e.preventDefault();
              const targetId = this.getAttribute('href').substring(1);
              let targetElement = document.getElementById(targetId);
              
              // If not found, try to find by heading text
              if (!targetElement) {
                const headingText = targetId.replace(/-/g, ' ');
                const allHeadings = document.querySelectorAll('#content h1, #content h2, #content h3, #content h4, #content h5, #content h6');
                for (const heading of allHeadings) {
                  if (heading.textContent.toLowerCase().trim() === headingText.toLowerCase()) {
                    targetElement = heading;
                    break;
                  }
                }
              }
              
              if (targetElement) {
                targetElement.scrollIntoView({ 
                  behavior: 'smooth', 
                  block: 'start' 
                });
                // Update URL hash without jumping
                history.pushState(null, null, '#' + targetId);
              } else {
                console.warn('Target element not found:', targetId);
                console.log('Available IDs:', Array.from(document.querySelectorAll('#content [id]')).map(el => el.id));
              }
            });
          });
          
          // Scroll to hash if present in URL
          if (window.location.hash) {
            setTimeout(() => {
              const target = document.getElementById(window.location.hash.substring(1));
              if (target) {
                target.scrollIntoView({ behavior: 'smooth', block: 'start' });
              }
            }, 100);
          }
        })
        .catch(error => {
          document.getElementById('content').innerHTML = `
            <div class="error">
              <p>Please make sure the file exists in the docs folder.</p>
            </div>
          `;
        });
    }
    
    // Build navigation from H2 and H3 headings
    function buildNavigation() {
      const content = document.getElementById('content');
      const h2Elements = content.querySelectorAll('h2');
      const h3Elements = content.querySelectorAll('h3');
      
      const leftNavList = document.getElementById('left-nav-list');
      const rightNavList = document.getElementById('right-nav-list');
      
      leftNavList.innerHTML = '';
      rightNavList.innerHTML = '';
      
      // Build left navigation (H2 sections)
      h2Elements.forEach((h2, index) => {
        // Ensure H2 has an ID
        if (!h2.id) {
          h2.id = 'section-' + index;
        }
        
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.href = '#' + h2.id;
        a.textContent = h2.textContent;
        a.addEventListener('click', function(e) {
          e.preventDefault();
          scrollToElement(h2.id);
        });
        li.appendChild(a);
        leftNavList.appendChild(li);
      });
      
      // Build right navigation (H3 subsections)
      let currentH2 = null;
      const allHeadings = content.querySelectorAll('h2, h3');
      
      allHeadings.forEach((heading, index) => {
        if (heading.tagName === 'H2') {
          currentH2 = heading;
        } else if (heading.tagName === 'H3') {
          // Ensure H3 has an ID
          if (!heading.id) {
            heading.id = 'subsection-' + index;
          }
          
          const li = document.createElement('li');
          const a = document.createElement('a');
          a.href = '#' + heading.id;
          a.textContent = heading.textContent;
          a.addEventListener('click', function(e) {
            e.preventDefault();
            scrollToElement(heading.id);
          });
          li.appendChild(a);
          rightNavList.appendChild(li);
        }
      });
      
      // Show/hide navigation panels
      document.getElementById('left-nav').style.display = h2Elements.length > 0 ? 'block' : 'none';
      document.getElementById('right-nav').style.display = h3Elements.length > 0 ? 'block' : 'none';
    }
    
    // Scroll to element with smooth behavior
    function scrollToElement(id) {
      const element = document.getElementById(id);
      if (element) {
        element.scrollIntoView({ behavior: 'smooth', block: 'start' });
        history.pushState(null, null, '#' + id);
        updateActiveNavItem();
      }
    }
    
    // Setup scroll spy to highlight current section
    function setupScrollSpy() {
      let ticking = false;
      
      window.addEventListener('scroll', function() {
        if (!ticking) {
          window.requestAnimationFrame(function() {
            updateActiveNavItem();
            ticking = false;
          });
          ticking = true;
        }
      });
      
      // Initial update
      updateActiveNavItem();
    }
    
    // Update active navigation item based on scroll position
    function updateActiveNavItem() {
      const content = document.getElementById('content');
      const headings = content.querySelectorAll('h2, h3');
      
      let currentHeading = null;
      const scrollPosition = window.scrollY + 100; // Offset for better UX
      
      // Find the current heading
      headings.forEach(heading => {
        if (heading.offsetTop <= scrollPosition) {
          currentHeading = heading;
        }
      });
      
      // Update left nav (H2)
      const leftNavLinks = document.querySelectorAll('#left-nav a');
      leftNavLinks.forEach(link => {
        link.classList.remove('active');
        if (currentHeading && link.getAttribute('href') === '#' + currentHeading.id) {
          link.classList.add('active');
        }
      });
      
      // Update right nav (H3)
      const rightNavLinks = document.querySelectorAll('#right-nav a');
      rightNavLinks.forEach(link => {
        link.classList.remove('active');
        if (currentHeading && link.getAttribute('href') === '#' + currentHeading.id) {
          link.classList.add('active');
        }
      });
      
      // Update right nav to show subsections of current H2
      if (currentHeading && currentHeading.tagName === 'H2') {
        updateRightNavForSection(currentHeading);
      } else if (currentHeading && currentHeading.tagName === 'H3') {
        // Find parent H2
        let h2 = currentHeading.previousElementSibling;
        while (h2 && h2.tagName !== 'H2') {
          h2 = h2.previousElementSibling;
        }
        if (h2) {
          updateRightNavForSection(h2);
        }
      }
    }
    
    // Update right navigation to show only H3s under current H2
    function updateRightNavForSection(h2Element) {
      const content = document.getElementById('content');
      const rightNavList = document.getElementById('right-nav-list');
      
      // Find all H3s between this H2 and the next H2
      const allHeadings = content.querySelectorAll('h2, h3');
      const h3s = [];
      let inSection = false;
      
      allHeadings.forEach(heading => {
        if (heading === h2Element) {
          inSection = true;
        } else if (heading.tagName === 'H2' && inSection) {
          inSection = false;
        } else if (heading.tagName === 'H3' && inSection) {
          h3s.push(heading);
        }
      });
      
      // Rebuild right nav
      rightNavList.innerHTML = '';
      h3s.forEach((h3, index) => {
        if (!h3.id) {
          h3.id = 'subsection-' + h2Element.id + '-' + index;
        }
        
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.href = '#' + h3.id;
        a.textContent = h3.textContent;
        a.addEventListener('click', function(e) {
          e.preventDefault();
          scrollToElement(h3.id);
        });
        li.appendChild(a);
        rightNavList.appendChild(li);
      });
    }
    
    // Language switching functionality
    function getCurrentLanguage() {
      // Detect language from current docFile
      if (docFile.includes('-fr.md') || docFile.includes('French/')) {
        return 'fr';
      }
      return 'en';
    }
    
    function switchLanguage(newLang) {
      const currentLang = getCurrentLanguage();
      if (currentLang === newLang) return;
      
      let newDocFile = docFile;
      
      // Convert between English and French file paths
      if (newLang === 'fr') {
        // Switch to French
        if (docFile.includes('English/')) {
          // File is in English folder
          newDocFile = docFile.replace('English/', 'French/');
          // Add -fr suffix if not already present
          if (!newDocFile.includes('-fr.md')) {
            newDocFile = newDocFile.replace('.md', '-fr.md');
          }
        } else if (docFile.includes('../README.md')) {
          // Root README
          newDocFile = 'French/README-fr.md';
        } else {
          // Just add -fr suffix
          newDocFile = newDocFile.replace('.md', '-fr.md');
        }
      } else {
        // Switch to English
        if (docFile.includes('French/')) {
          // File is in French folder
          newDocFile = docFile.replace('French/', 'English/');
          // Remove -fr suffix
          newDocFile = newDocFile.replace('-fr.md', '.md');
        } else {
          // Just remove -fr suffix
          newDocFile = newDocFile.replace('-fr.md', '.md');
        }
      }
      
      // Update URL and reload
      const newUrl = new URL(window.location.href);
      newUrl.searchParams.set('doc', newDocFile);
      window.location.href = newUrl.toString();
    }
    
    // Setup language switcher buttons
    function setupLanguageSwitcher() {
      const currentLang = getCurrentLanguage();
      const langButtons = document.querySelectorAll('.lang-btn');
      
      // Update active state
      langButtons.forEach(btn => {
        const btnLang = btn.getAttribute('data-lang');
        if (btnLang === currentLang) {
          btn.classList.add('active');
        } else {
          btn.classList.remove('active');
        }
        
        // Add click handler
        btn.addEventListener('click', function() {
          const targetLang = this.getAttribute('data-lang');
          switchLanguage(targetLang);
        });
      });
      
      // Update navigation headers based on language
      const leftNavHeader = document.getElementById('left-nav-header');
      const rightNavHeader = document.getElementById('right-nav-header');
      
      if (currentLang === 'fr') {
        leftNavHeader.textContent = 'Sections';
        rightNavHeader.textContent = 'Dans cette section';
      } else {
        leftNavHeader.textContent = 'Sections';
        rightNavHeader.textContent = 'In This Section';
      }
    }
    
    // Initialize language switcher
    if (!isLocalFile) {
      setupLanguageSwitcher();
    }
  </script>
</body>
</html>
