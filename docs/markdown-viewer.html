<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Documentation Viewer</title>
  <link rel="stylesheet" href="../css/markdown-viewer.css">
</head>
<body>
  <a href="javascript:window.close()" class="back-btn">← Close</a>
  <div class="container">
    <div id="content" class="loading">Loading documentation...</div>
  </div>

  <!-- Marked.js from CDN for markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
  
  <script>
    // Get the document parameter from URL
    const urlParams = new URLSearchParams(window.location.search);
    // Language-aware doc path
    let docFile = urlParams.get('doc');
    if (!docFile) {
      // Default to English README
      docFile = 'English/README.md';
    } else if (!docFile.includes('/')) {
      // If only a filename is given, guess language by prefix
      const lang = urlParams.get('lang');
      if (lang === 'fr' || docFile.endsWith('-fr.md')) {
        docFile = 'French/' + docFile;
      } else {
        docFile = 'English/' + docFile;
      }
    }
    
    // Configure marked options
    marked.setOptions({
      breaks: true,
      gfm: true, // GitHub Flavored Markdown
      tables: true,
      headerIds: true,
      mangle: false // Don't mangle IDs
    });

    // Check if we're running on local file system (file://) or web server (http://)
    const isLocalFile = window.location.protocol === 'file:';

    if (isLocalFile) {
      // Running from file system - open .md file directly
      document.getElementById('content').innerHTML = `
        <div style="padding: 20px; text-align: center;">
          <h2>Opening Markdown File...</h2>
          <p>Your markdown file should open in a new tab.</p>
          <p>If it doesn't, <a href="${docFile}" target="_blank" style="color: #5078ff;">click here to open ${docFile}</a></p>
          <hr style="margin: 30px 0; border-color: #333;">
          <p style="color: #888; font-size: 0.9rem;">
            <strong>Tip:</strong> For styled documentation, serve this folder with a local web server:<br>
            <code style="background: #1a1a1a; padding: 5px 10px; border-radius: 3px; margin-top: 10px; display: inline-block;">python3 -m http.server 8000</code><br>
            Then open: <code style="background: #1a1a1a; padding: 5px 10px; border-radius: 3px;">http://localhost:8000/ZigzagEmitter_12.html</code>
          </p>
        </div>
      `;
      // Automatically open the markdown file
      window.location.href = docFile;
    } else {
      // Running from web server - fetch and render with styling
      fetch(docFile)
        .then(response => {
          if (!response.ok) {
            throw new Error(`Failed to load ${docFile}`);
          }
          return response.text();
        })
        .then(markdown => {
          // Convert markdown to HTML
          const html = marked.parse(markdown);
          document.getElementById('content').innerHTML = html;
          
          // Update page title based on first H1
          const firstH1 = document.querySelector('#content h1');
          if (firstH1) {
            document.title = firstH1.textContent + ' - Documentation';
          }
          
          // Setup anchor link handling
          document.querySelectorAll('#content a[href^="#"]').forEach(link => {
            link.addEventListener('click', function(e) {
              e.preventDefault();
              const targetId = this.getAttribute('href').substring(1);
              let targetElement = document.getElementById(targetId);
              
              // If not found, try to find by heading text
              if (!targetElement) {
                const headingText = targetId.replace(/-/g, ' ');
                const allHeadings = document.querySelectorAll('#content h1, #content h2, #content h3, #content h4, #content h5, #content h6');
                for (const heading of allHeadings) {
                  if (heading.textContent.toLowerCase().trim() === headingText.toLowerCase()) {
                    targetElement = heading;
                    break;
                  }
                }
              }
              
              if (targetElement) {
                targetElement.scrollIntoView({ 
                  behavior: 'smooth', 
                  block: 'start' 
                });
                // Update URL hash without jumping
                history.pushState(null, null, '#' + targetId);
              } else {
                console.warn('Target element not found:', targetId);
                console.log('Available IDs:', Array.from(document.querySelectorAll('#content [id]')).map(el => el.id));
              }
            });
          });
          
          // Scroll to hash if present in URL
          if (window.location.hash) {
            setTimeout(() => {
              const target = document.getElementById(window.location.hash.substring(1));
              if (target) {
                target.scrollIntoView({ behavior: 'smooth', block: 'start' });
              }
            }, 100);
          }
        })
        .catch(error => {
          document.getElementById('content').innerHTML = `
            <div class="error">
              <p>Please make sure the file exists in the docs folder.</p>
            </div>
          `;
        });
    }
  </script>
</body>
</html>
