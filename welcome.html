<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZigMap26</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #000;
      color: #fff;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-weight: 400;
      line-height: 1.5;
      min-height: 100vh;
      padding: 60px 40px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 80px;
      border-bottom: 1px solid #333;
      padding-bottom: 24px;
    }

    h1 {
      font-size: 32px;
      font-weight: 500;
      letter-spacing: 0.02em;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 14px;
      color: #666;
      font-weight: 400;
    }

    .section {
      margin-bottom: 64px;
    }

    .section-title {
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #999;
      margin-bottom: 24px;
    }

    .app-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: #333;
      border: 1px solid #333;
    }

    .app-card {
      background: #000;
      padding: 32px;
      text-decoration: none;
      color: #fff;
      display: block;
    }

    .app-card:hover {
      background: #111;
    }

    .app-name {
      font-size: 18px;
      font-weight: 500;
    }

    .preset-list {
      list-style: none;
      border: 1px solid #333;
      border-bottom: none;
    }

    .preset-item {
      border-bottom: 1px solid #333;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
    }

    .preset-info {
      padding: 20px 24px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 16px;
    }

    .preset-name {
      font-size: 14px;
      font-weight: 400;
      color: #fff;
    }

    .preset-type {
      font-size: 11px;
      text-transform: uppercase;
      color: #666;
      letter-spacing: 0.05em;
    }

    .preset-actions {
      display: flex;
      border-left: 1px solid #333;
    }

    .preset-button {
      background: #000;
      border: none;
      border-left: 1px solid #333;
      color: #fff;
      padding: 20px 32px;
      text-decoration: none;
      font-size: 12px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: block;
    }

    .preset-button:first-child {
      border-left: none;
    }

    .preset-button:hover {
      background: #111;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .refresh-button {
      background: #000;
      border: 1px solid #333;
      color: #fff;
      padding: 8px 16px;
      font-size: 11px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
    }

    .refresh-button:hover {
      background: #111;
    }

    .refresh-button:active {
      background: #222;
    }

    footer {
      margin-top: 80px;
      padding-top: 24px;
      border-top: 1px solid #333;
      font-size: 11px;
      color: #666;
    }

    @media (max-width: 768px) {
      body {
        padding: 40px 20px;
      }

      header {
        margin-bottom: 60px;
      }

      h1 {
        font-size: 24px;
      }

      .section {
        margin-bottom: 48px;
      }

      .app-list {
        grid-template-columns: 1fr;
      }

      .preset-item {
        grid-template-columns: 1fr;
      }

      .preset-actions {
        border-left: none;
        border-top: 1px solid #333;
      }

      .preset-button {
        flex: 1;
        text-align: center;
        padding: 16px;
      }

      .preset-button:first-child {
        border-left: 1px solid #333;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>ZigMap26</h1>
      <p class="subtitle">Zigzag Emitter</p>
    </header>

    <section class="section">
      <h2 class="section-title">Applications</h2>
      <div class="app-list">
        <a href="index.html" class="app-card">
          <div class="app-name">Editor</div>
        </a>
        <a href="player.html" class="app-card">
          <div class="app-name">Player</div>
        </a>
      </div>
    </section>

    <section class="section">
      <div class="section-header">
        <h2 class="section-title">Project Presets</h2>
        <button class="refresh-button" onclick="loadPresets()">Refresh</button>
      </div>
      <ul class="preset-list" id="preset-list">
<!-- PRESETS_START -->
        <li class="preset-item">
          <div class="preset-info">
            <span class="preset-name">zigmap_init.json</span>
            <span class="preset-type">Init</span>
          </div>
          <div class="preset-actions">
            <a href="index.html?preset=zigmap_init" class="preset-button">Editor</a>
            <a href="player.html?preset=zigmap_init" class="preset-button">Player</a>
          </div>
        </li>
        <li class="preset-item">
          <div class="preset-info">
            <span class="preset-name">zigmap_horizon.json</span>
            <span class="preset-type">Preset</span>
          </div>
          <div class="preset-actions">
            <a href="index.html?preset=zigmap_horizon" class="preset-button">Editor</a>
            <a href="player.html?preset=zigmap_horizon" class="preset-button">Player</a>
          </div>
        </li>
        <li class="preset-item">
          <div class="preset-info">
            <span class="preset-name">zigmap_horizon2.json</span>
            <span class="preset-type">Preset</span>
          </div>
          <div class="preset-actions">
            <a href="index.html?preset=zigmap_horizon2" class="preset-button">Editor</a>
            <a href="player.html?preset=zigmap_horizon2" class="preset-button">Player</a>
          </div>
        </li>
        <li class="preset-item">
          <div class="preset-info">
            <span class="preset-name">zigmap_horizon3.json</span>
            <span class="preset-type">Preset</span>
          </div>
          <div class="preset-actions">
            <a href="index.html?preset=zigmap_horizon3" class="preset-button">Editor</a>
            <a href="player.html?preset=zigmap_horizon3" class="preset-button">Player</a>
          </div>
        </li>
<!-- PRESETS_END -->
      </ul>
    </section>

    <footer>
      © ddelcourt 26 — Mapping festival
    </footer>
  </div>

  <script>
    async function loadPresets() {
      try {
        const response = await fetch('config/presets/manifest.json');
        if (!response.ok) {
          console.error('Failed to load manifest');
          return;
        }
        
        const data = await response.json();
        const presetList = document.getElementById('preset-list');
        
        // Clear current list
        presetList.innerHTML = '';
        
        // Generate preset items
        data.presets.forEach(preset => {
          const li = document.createElement('li');
          li.className = 'preset-item';
          
          li.innerHTML = `
            <div class="preset-info">
              <span class="preset-name">${preset.filename}</span>
              <span class="preset-type">${preset.type}</span>
            </div>
            <div class="preset-actions">
              <a href="index.html?preset=${preset.name}" class="preset-button">Editor</a>
              <a href="player.html?preset=${preset.name}" class="preset-button">Player</a>
            </div>
          `;
          
          presetList.appendChild(li);
        });
        
        console.log(`Loaded ${data.presets.length} preset(s)`);
      } catch (error) {
        console.error('Error loading presets:', error);
      }
    }
    
    // Load presets on page load
    document.addEventListener('DOMContentLoaded', loadPresets);
  </script>
</body>
</html>
          </div>
        </li>
      </ul>
    </div>

  </div>
</body>
</html>
